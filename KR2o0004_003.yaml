body:
  text: 唐史論斷卷下宋孫甫撰憲宗李綘料魏博事勢論曰李綘料魏博事勢請憲宗不用兵遂收其地此真廟堂之謀與之同列者得不推其賢贊其謀以濟國事安可異議邪河北自天寶之亂陷賊廣德初雖平之尋為強臣所據傳付其家各為子孫業至元和中六十年矣德宗常以魏博叛逆遣將討之反致大亂憲宗又以鎮定拒命出兵伐之卒不能平蓋三鎮相為勢援復結河南叛臣膠固其力不可卒破也及田季安死懷諫一稚子領軍府事李吉甫利其幼弱建議用兵以取魏博此固常人之見殊不知三鎮相結正為子孫計一稚子雖可取奈它鎮救援何必又如前日伐鎮州之失策也李綘獨以先覺之明論河北諸將用部將之計令均管軍馬不偏任一將故力敵權均為變不得又當主帥威權能制死命此策在賊中固便今魏博之勢一童子為帥不能領事必偏任一將所任者權重衆心不服則六十年均任之計為賊中患矣衆既起變必歸軍中一寬厚之人部將忽起主兵權懼它鎮攻討非納疆土歸朝則存立不得此必然之勢也綘料千里未形之事如見憲宗英明從之不兩月魏博軍中有變如綘所料部將田興以六州版籍請命於朝是綘之算如神真廟堂之謀也初吉甫請用兵討伐綘料其勢堅止用兵當論未形之事以平常之見尚可異議及田興請命事已效矣猶請遣中使宣勞以觀其變待回日處置賴綘力爭不已憲宗頗有英斷不待使回授田興節度之命使諸鎮畏威知恩平定兩河自兹而始以綘之賢明忠亮視吉甫為何人然吉甫亦忠智可稱非庸常姦回之人也但恥智略不逮於綘故有橫議以撓其謀至使內臣援助幾敗國事遂成姦回所為也夫宰相謀謨係天下休戚已有不逮理當博采同列嘉謨固當贊助若宋璟與蘇許公同相明皇璟刪正多所裁斷蘇順其美奏對則為之助故璟得盡其才為開元賢相蘇亦獲美名於時若綘與吉甫權德輿同列綘吉甫屢於憲宗前論事形於言也其詣理者德輿亦不能為之發明故時論以循默貶之然則宰相之任能了軍國大事此固大才上也若智謀不至能從同列之議而贊助焉亦其次也若不能發明同列議論循默不言斯為下矣若吉甫撓綘正論又與內臣相結幾敗國事雖有他節可觀此一事不得不為姦回也後之為相者切戒之用裴度相論曰前代以來天子有興治平亂之志而或功不成事不立者明斷不足也以天子之尊有明斷之才何為而不可蓋當興治平亂之時必究事機詳利害任賢者去時弊數者之類君不能獨計必謀之臣臣未必皆賢必有異同之論若辨之不至則惑惑則其事不行雖或行之一姦人沮之則半道而止矣此明斷不足之患也憲宗用裴度為相使平冦亂可謂明斷至矣憲宗以河北藩臣不奉朝命方有平定之志吳元濟於河南近鎮擅襲父位且放兵肆劫命將討之鎮鄆二賊同惡相援乞赦元濟之罪憲宗不許但委武元衡經畫其事又得裴度贊其大計鎮鄆二賊乘凶忿恣行逆計至遣其黨於都下害武元衡及傷裴度中外惶駭日虞不測有獻計者請罷裴度官以安賊心憲宗大怒曰若罷度官是姦計得行朝綱何以振舉朕用裴度一人足以破賊此真英主之言也夫能知裴度之賢足以破賊明之至也京師凶賊竊發殺害宰相不撓用兵之計斷之至也宜乎不數年誅除宿盜平定兩河盡復髙祖太宗之土向非明斷之才何以至此夫用兵固難事加六十年叛渙之地朝廷恬於姑息一日決計征討止由明斷遂果有功若軍國之事不至如此之難者天子以明斷行之豈有不成乎李鄘辭平章事論曰李鄘辭平章舊史謂鄘雖出入顯重素不以公輔自許此記事者不能知賢人心迹也鄘初為李懷光從事不顧凶逆氣焰而奮其忠義以郎官使徐州諭叛兵禍福使之帖息任京兆著剛嚴之名鄘之風節如此元和初拜鳳翔節度使是鎮舊用武將有神策行營之稱初受命必詣軍修謁鄘奏罷之其不附宦者有素矣及鎮淮南會吐突承璀監軍承璀方貴寵鄘亦剛嚴自處差相畏重未嘗相失承璀歸朝薦鄘憲宗用其言乃命作相鄘與承璀不相失者與天子貴寵臣共事不可下不可慢百事及禮而已我謹於禮彼亦不能驕彼不驕則不能撓我事矣鄘之意止於此豈欲其薦已哉君子進用於時不可失其正況宰相之任安可由宦者引用此所以懇辭其任正與前不受神策行營之稱同爾若謂鄘素不以公輔自許則凡仕者非至懦之品誰不欲至貴位大者思行其道小者思濟其欲況鄘之賢巳位方鎮何不自許為宰相也鄘恥為宦者所薦不顧宰相之貴以全名節史官不能發明其事以戒世之姦邪卑猥附權幸以進而不知恥者乃謂鄘素不以公輔自許其不知賢人之心迹甚矣注意相論曰古人謂天下安注意相天下危注意將此非通論夫天下安固注意於相天下危亦宜注意於相也相得人則將自出矣今觀唐事大可驗德宗建中時以兩河亂鋭意平定得馬燧李抱真李晟輩數名將任之竟不能平魏博淄青之亂反致大變者相不得人也所相者盧杞無公忠之心無經營處置之才雖有名將功不克成也憲宗自即位有興復大業之志首得杜黃裳陳安危之本啓其機斷繼得武元衡裴垍李綘裴度謀議國事數人皆公忠至明之人故能選任將帥平定冦亂纍年叛渙之地得為王土四方之人再見太平者相得人也則所謂天下危亦當注意於相相得人將自出矣非其驗歟或曰建中之間叛者李希烈田恱朱滔皆劇賊非元和中劉闢李錡盧從史王承宗吳元濟李師道之比也故馬燧輩不能平希烈等數賊髙崇文輩能平闢等數叛臣也此由賊之強弱將之用力難易何繫於相之事焉答曰希烈等雖劇賊過於闢等然馬燧李抱真李晟之將亦過於髙崇文李光顔李訴之徒矣將才賊勢正兩相等前後成功異者實繫於相也建中元和之事難以疏舉今舉一二顯者證之馬燧輩敗田悅於洹水恱奔魏州城中敗卒無三二千人皆夷傷未起日夕俟降燧等若乘勝進取獲田悅收魏博反掌間耳時河北劇賊惟悅悅既平李納勢孤望風自降況朱滔等未叛河北既無事河南諸賊無黨援何能為哉但燧與抱真不和遷延不進致悅嬰城固守且誘朱滔等同叛遂成橫流之勢蓋燧窺朝廷之事盧把所為險薄專招怨讐必無公平之法故少所畏憚敢乘私忿之心不了國事也杜黃裳薦髙崇文討劉闢崇文固盡心國事黃裳尚慮未果成功以其所憚者制之諭之曰若不用命當以劉澭代汝黃裳既薦名將復以能者制之崇文不得不速於立功也裴度續督戰淮西諸將聞之無不用命知度必能賞功罰罪也以此證之天下安危皆繫於相豈不章章乎然相之賢非天子之明不能任此又見憲宗之明也憲宗之明能任賢相則德宗以政柄付之姦人果何如主哉元和之治建中之亂後之君天下者宜鑒之裴度罷相位論曰憲宗用數賢相故能平治天下然數相中裴度功尤大惜乎以成大功遽為姦人所擠罷去相位何前日用度之明後罷度之昏也當淮西之亂鎮鄆連謀變起都城宰輔被害時不用度賊勢莫遏天下亂矣憲宗既以明斷用度度得盡其才經營國事故朝政日修國威日振平淮西服鎮州收淄青四方欣欣再見平世度之大功如是若久任之貞觀之治可復也但憲宗以世難漸平有侈樂之態姦人皇甫鎛本以聚斂進用至為宰相度極陳鎛姦惡之狀一不聽納鎛自知公議不容益以狡計固寵會內出陳朽庫物付度支鎛以善價賈之用給邊軍將士大怒焚其所賜度入言之鎛於人主前引足指靴曰此乃內庫物也臣以二千得之其堅如此此真奴僕之態憲宗寵奴僕之人不顧忠臣之奏竟以鎛言罷度相位何昏暗如此蓋憲宗中智可上可下之主也當患難則能用忠良稍無事則必説姦佞用忠良所以成己之事説姦佞又以濟己之欲故前之用度其明出中智之上懼患難之大也後日寵鎛其昏在中智之下見世事之平也又素寵內臣吐突承璀承璀方用事鎛以賂結之姦計日行度不得不罷也度既罷鎛得專養君欲自固恩勢憲宗方蕩然自得謂天下無事唯慮年壽之不長侈樂之不極鎛進方士以長生惑之宦官衆多日益親寵不數月為金丹所誤忿怒不常宦官遂起逆謀矣前日用賢能平天下後日寵姦不保其身以憲宗中智以上之主功業已成威福甚盛一日昏惑尚取大禍後之人君功業威福不逮者得不為戒穆宗失河北論曰長慶失河北穆宗昏主崔植杜元頴輩庸才皆不足議迹其本由憲宗失之也元和十年憲宗用裴度相至十四年兩河平定天下藩鎮無跋扈之臣時方治平憲宗遂有驕逸之意以姦人皇甫鎛為相逐度出鎮憲宗既逐度穆宗止得用崔植元頴輩矣逐賢相任常才欲天下無事不可得爾所以復失河北也一賢者相凡四年平定天下數常才相不二年河北復亂所謂天下安危皆繫於相事豈不明乎或曰憲宗用裴度相雖平定兩河然鎮之受代在蕭俯段文昌崔植作相之時幽之納土在元頴作相之後二鎮雖復失之本亦由數相得之何關裴度事耶答曰長慶初得幽鎮雖在植輩作相之時然本由裴度能定兩河故國威大振鎮州覩諸賊伏誅無所援助納德棣質愛子朝憂夕懼不敢保首領鎮既懼幽自懾伏矣致國威如是非度而誰植輩相穆宗得鎮得幽乘時得之耳有何施為乎亦猶李林甫牛仙客初相明皇尚致天下獄訟稀少也況蕭俯段文昌建議銷兵先以失策則植輩常才可知也兼不止失幽冀鎮魏博亦為賊臣所據矣若憲宗既平天下深念安危之本不縱驕逸不任姦人使度久於其位經制國事以固本業穆宗雖中常之主顧大勳德為輔必不至荒僻姦邪幸臣憚宰相剛正必不敢肆其所為藩鎮懼宰相威略必不敢跋扈若是天下豈有事乎憲宗既已逐賢相穆宗為君僅及中智數常才相之衆邪幸惑之朝政不修法度廢弛藩臣何憚而不亂也長慶君臣之事不足議其本由憲宗失之也韋處厚乞相裴度論曰韋處厚不顧李逢吉凶威而斥其黨不念裴度舊隙而言其賢此公忠之性過人而益之以至明也當昭愍即位以童年方倚大臣大臣李逢吉凶人也欺天子幼弱大植朋黨專報私怨有所貶逐者百僚賀於中書以明快意其姦凶氣焰至此在朝之人孰敢犯之處厚一侍臣孤直自立任郎官日常為裴度因事貶官逢吉於度亦所深怨也處厚犯權臣之威稱其所怨復不念己之隙力言其賢蓋以逢吉所為乃凶狂之態我公直無過何畏彼哉度雖嘗逐我未知我耳河北之亂非度不能平定當天子憂憤之時度方為逢吉所抑不得大用我近臣也安得以有隙而不言其賢哉是公忠之性過人而益之以至明也夫公忠則專計國事而不為身謀至明則深辨事理之歸處厚盡是道宜乎位至宰相才業名德重於天下也昭愍遇害論曰昭愍年十六即位非上智之性不無童心然能納韋處厚忠言辨李逢吉姦黨知裴度大賢而召之復相從李程之諫輟土木之後得李德裕奏令罷進繚綾聽裴度陳論止東都巡幸復數視朝勤於聽政以此觀之本非荒暗之主若忠賢久於輔導亦庶幾漢昭之比也但為內臣惑亂極其荒僻而崩原其事迹不止昭愍之過乃近臣積習之患也何以驗之緣內臣仇士良致仕戒其黨曰今日為諸君言久逺計天子莫教間間則讀書讀書則近文臣重文臣則廣納規諫減玩好省遊幸如此則吾輩恩澤漸薄權力不重諸君常以毬獵聲樂惑亂之遊幸之所極奢侈盡竒伎使一處盛於一處如此則不暇讀書不親萬機不知外事吾輩恩澤永無踈間觀士良之言則內臣姦巧惑亂人主之術盡見矣夫功業之君在位嵗久如憲宗者不能免內臣之惑況沖年之君即位之初乎雖忠賢輔導於外間數日一見率不過數刻接對所言者多逆意之事姦巧內臣窮日夜惑亂所言者多徇欲之事在沖年之君中人之性何理勝之哉既惑亂之又慮沖年之性喜怒無定或責罰之禍及乃行弒逆之謀凡七年之間弒逆再矣後之人主得不凜凜乎文宗貶杜元頴論曰杜元頴事憲宗為翰林學士穆宗即位自司勳員外郎加中書舍人不周嵗用為宰相時議詞臣進用之速未有其比宜罄所學盡忠節以輔時治茍謀議有失但竭心於事亦可見大臣報國之節何得略無能效著聞於時已負國矣及出鎮於蜀遇昭愍沖年即位首進罨畫打毬衣五百事自後廣求珍異玩好之具貢奉相繼用圖恩寵以至纎息倍斂大取軍民之怨不忠無識一至於此人臣已為將相矣若守正獲寵此固至榮然於將相之位又何以加若守正自固而為主所疏矣已必無過亦不為辱至於名亦未必失何乃遇人君沖年專導侈欲以圖恩寵恩寵果深欲何為哉如李德裕在浙西昭愍凡有宣索再三論奏罷其貢獻此以生民為意不奉君之侈欲也觀德裕之賢視元頴為何人蓋元頴窺憲宗晚年及穆宗長年即位多縱侈樂厚纎人二長君尚若此昭愍童年尤常奢逸遂專以侈靡奉之殊不知窺時作事而不正者事極而禍變起矣使元頴不誅斂民人專奉君欲未必不入登三事苟不登三事外不失方面之任內不失尚書僕射之位反以圖寵之故專務誅剝以取衆怨蠻賊乘隙大害一方坐是貶死遐裔後之為將相者可不戒哉辨朋黨論曰人君惡臣下朋黨者以其植私而背公欺聰明竊威福亂國政也朋黨為患如是誠不可不防然在辨之精爾辨之不精君子為小人所陷矣蓋君子小人各有其徒君子之徒以道合小人之徒以利合以道合者思濟其功此同心於國事非朋黨也以利合者思濟其欲此同心於私計乃朋黨也二者混殽並進非明君曷易辨之君不能辨則君子為小人所勝必矣蓋君子之徒見義則鋭意以進誠其言直其道不能曲防非意之事小人窺之懼君子道行則不便於己取疑似之迹讒之於君矣君子被讒又恥自辨但守道自信而已小人之徒不然見利則詭計以進巧其言曲其意復彌縫其隙用心無所不至勝於人便於己險薄邪佞皆可為所以常勝於君子也君子小人情狀如此非君之明曷能辨也前代之君辨者少而不辨者多其事不能疏舉直以唐之四事論之君至明則人不能誣人以朋黨君雖明為情所惑則不能察小人之黨辨君子之不黨君雖明而弱雖辨君子小人而不能制其黨君明不足雖察其有黨而不能辨其情之輕重貞觀中蕭瑀謂房喬輩數大臣相黨常獨奏云此等相與執權有同膠漆陛下不細詢知但未反爾太宗謂瑀曰為人君者須駕馭英才推心待士卿言不亦甚乎何至於此時房喬輩同心國事知無不為瑀雖非小人但以性剛躁復多猜惑妄言喬輩朋黨太宗英明方辨其事不然數賢何以免責不惟不免其責且無以盡其才謀助成治平之業矣此所謂君至明則不能誣人以朋黨也元和末裴度崔羣同相度以勛德羣以仁賢為天下瞻望及皇甫鎛以聚斂進復結幸臣取相位中外大以為非度羣纍言鎛邪險之狀憲宗反疑度羣朋黨寵鎛愈甚至謂度等曰人臣事君但力行善事自致公望何乃好植朋黨度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是謂朋黨帝曰他人之言亦與卿言相似豈易辨之夫以度羣之大賢視鎛之邪黨如鸞皇之與蚊虻人人可見而憲宗惑之蓋方務邪樂惡忠而喜佞也觀初用度羣之意非為不明一日昏惑至此此所謂君雖明為情所惑則不能察小人之黨辨君子之不黨也昭愍即位其相李逢吉大植朋黨明報録怨排裴度逐李紳欺君沖幼略無所憚賴韋處厚不顧凶險氣焰言度之大賢雪紳之非辜昭愍深信處厚之忠許度復相憫紳貶逐然不能誅逢吉之姦黨此所謂君雖明而弱雖辨君子小人之徒不能制其黨也至文宗辨德裕宗閔之黨大惡之然觀二李之過似均而情之輕重則異矣宗閔輩在元和中對賢良策深詆時病李吉甫作相怒其言薄其恩命故宗閔憾焉後宗閔得用排李德裕及其相與者德裕得用亦排宗閔及其相與者故交怨不解其過似均矣但德裕未相在穆宗昭愍朝論事忠直有補於時所厯方鎮大著政效又裴度常薦之作相為宗閔輩所沮而罷遂領劒南雖因監軍王踐言入言維州事文宗召以歸朝遂命作相本由功名用也及秉政羣邪不悅竟為姦人李訓鄭注所譛引宗閔代之宗閔未相絶無功效著聞任侍郎日結女學士宋若憲知樞密楊承和求作相以此得之及其出鎮也又由訓注復用此德裕之賢與宗閔不侔矣又德裕所與者多才德之人幾於不黨但剛強之性好勝所怨者不忘所與者必進以此不免朋黨之纍然此宗閔之姦則情輕也文宗但以其各有黨嫉之不能辨其輕重之情明已不足矣又聽訓注所譛朝之善士多目為二李黨而逐之此所謂君明不足雖察其朋黨而不能辨其情之輕重也夫太宗之明為人君者當法之憲宗之惑為人君者當戒之昭愍之弱為人君者當勉之文宗之明不足為人君者當深思之深思之術尤在盡心焉且有人言於君曰某人朋黨也若其人道未信功未明君當詰之曰朋黨有何狀言者必曰相援以欺君也君又當詰之曰所欺者何事若陳所欺之事害於國病於人圖於利其狀明白此朋黨無疑大則罪之小則疏之宜矣若言者不能陳害人圖利之狀此乃誣人以朋黨大則罪之小則疏之亦宜矣又或言者陳似是之狀未甚明白君當審其人與言者位不相逼乎素無仇怨乎何人以公議進何人以權幸用何人論議有補於國何人才行有稱於時復參驗他臣而究其本末則言者與被言之人是非辨矣人君能如是臣下豈有朋黨之事或曰何以能如此答曰在明與公或曰中智之主性有所蔽明與公安得兩盡也曰不聽左右偏言則明矣不以説意親之不以忤意疏之則明矣制內臣論曰內臣贈官非古典也然於此見旌善之事焉內臣自武后稱制始預事尚未有招權著名者明皇朝髙力士以權寵擅名李林甫楊國忠安祿山輩皆因之取將相林甫等既致時亂力士貶死遐裔矣肅宗朝李輔國以扈從微勞過受恩寵至專掌禁兵故輔國脅遷明皇升黜將相凶橫既極盜殺之於家矣肅宗寵魚朝恩始命為觀軍容使代宗寵之又加天下觀軍容使朝恩驕橫既甚勢不可容遂使之自縊矣代宗又寵程元振使典禁兵元振姦險擅權大為將相之害代宗避狄陜州詔諸鎮兵赴援將帥懼元振誣譛多不敢至及栁伉極言其狀元振貶死荒徼矣德宗寵竇文場霍仙鳴命為神策中尉纎人裴均輩附之往往外取方鎮內取要官文場仙鳴輩權任既盛內臣亦嫉之仙鳴被害以死文場甚懼堅乞致仕僅免於禍憲宗寵吐突承璀至委鎮州征討之任卒無功效尋以其黨納賄事所連出為淮南監軍後復寵任以妄議太子為穆宗誅死文宗寵王守澄姦惡既甚竟至賜死自明皇以後內臣以罪誅死與貶者不可勝紀但力士等八人以權力著名於時此內臣之尤盛者然三誅死二貶死一為盜殺一毒死文場禍至而避亦姦名不朽以此觀之內臣取恩既盛鮮有不罹禍者蓋受恩不知紀極恣其所為以至過惡之甚也惟順宗朝俱文珍以剛直著稱又有翊戴憲宗之功位至右衛大將軍知內侍省事不聞驕暴之名及其卒也贈開府儀同三司文宗朝馬存亮雖在中尉不與王守澄同惡力止其屠害宋申錫家屬又有保衛昭愍之功權寵既盛能奉身以退是年卒贈揚州大都督兹二人者生獲令名死有光寵為善之效也天子任內臣能常以力士存亮等善惡之效示之無使權寵之過不惟不害國事亦足以保全之也鄭覃言開成政事論曰鄭覃言開成政事元年二年好三年四年即漸不好頗得其實楊嗣復不顧事理但謂覃譏已要君求退意不容覃至有上纍聖德之言此姦人計也開成初覃與李石同相贊文宗為治論議勤􅋀文宗勵精亦甚聽納如內置赦令一通以時省覽敕長吏奉行不違恩及天下紫宸與宰相及諸司官論事各舉職以郭承嘏任給事中有封駮之益不令外任湖南進羡餘錢令收貯以備水旱徐州稅色害人悉使除罷王彥威進度支錢羡餘物求寵給邊軍衣賜不時黜授衛尉卿嘉李石剛直之議沮內臣仇士良威勢不使撓權此元年二年之政事也至三年仇士良遣盜刺石文宗罷石政事使之出鎮朝廷待將相舊禮一皆寢罷以滋士良之勢中書門下奏事各挾所見動成忿競無至公同心之稱又奏改舊制不令僕射尚書等論朝廷事文宗取後宫之言議廢皇太子雖宰輔及憲官等論執得以不廢然太子尋薨於太陽院仇士良用軍中誣謗之事枉害五十餘家此三年四年之政事也以是觀之鄭覃之言豈非得實嗣復但恨覃沮已引用李宗閔之黨遂乘此指為瑕釁盡力排之覃與嗣復同相況居四輔之首既言政事一年不及一年亦自言其過嗣復不共謀國事求其失而更之但快憤心以覃言為過及罷覃獨當國政又何所施為哉不踰年禍敗蓋自取之也不能制內臣論曰文宗在位十五年好節儉尚仁惠納爭諫重儒術時與大臣論國事勤勤懇懇以致太平為思兹可謂仁愛之主然資性優柔乏明斷之才求治雖􅋀卒成孱弱之態足見人君之體明斷為大也若乏明斷雖勤政無過亦不免於孱弱矣文宗自即位惡內臣暴橫有除去之意又以其黨方盛不能公然處之遂密諭學士宋申錫與外廷謀之乃命申錫作相是重其權任使之立事也申錫方有謀王守澄窺之使本軍校誣申錫罪文宗不思倚任申錫本意至與大臣等久議不辨諫官懇論其事震怒斥之竟不出告者付外廷勘鞠雖賴衆議稍辨其狀申錫竟不免貶逐當時若出告者付外廷推究守澄雖巨惡詭迹顯露其黨曷敢附之況馬存亮輩本不與之同心去之何難既去守澄其黨見天子明斷如此安敢復驕橫也此機既失仇士良權力日盛士良嫉宰相李石剛正遣盜圖之幾於致害中外皆知士良所為文宗若法憲宗用裴度意益厚石且推變起之端正士良典刑其黨見天子明斷如此安敢出死力救之自取刑戮二事俱失內臣氣勢愈盛天子垂涕而不能制矣後之人君􅋀鑒之武宗殺陳王安王論曰武宗殺陳王安王又欲殺李珏等不惟褊狠之過乃不思召後代之亂也文宗繼昭愍即位晚節無子以陳王昭愍之子立為儲二李珏之議得其正矣及文宗大漸仇士良矯詔立武宗武宗文宗之弟於次序不若陳王之正然既即位陳王李珏何罪乃聽士良之譛乘褊狠之性也已殺陳王矣又欲殺珏雖輔相懇救其事然竟逐之是使大臣當立儲二之際不得正議也正議者獲罪則後之大臣當國嗣之議不敢忠言矣臣不敢忠言則天子之子必長年而大賢可無他慮若幼而未有賢名或無子孰敢正議其立者大臣不敢正議國嗣何時而定爭奪患起何所不至豈非召後代之亂耶如嗣復立安王之議乃為不正然必事狀明白中外所知乃可罪之以戒後挾私而議國事者如事狀曖昧寧知非譛又安可罪哉李德裕讓太尉論曰李德裕自穆宗至文宗朝厯內外職任奏議忠直政績彰顯遂當輔相之任然為邪佞所排不克就功業及相武宗英主始盡其才回鶻在邊先請待以恩好及其侵軼乃授劉沔石雄成算使之平蕩得中國大體上黨拒命舉朝懼生事不欲用兵德裕料其事勢奏遣使魏鎮先破聲援之謀且委征討之任魏帥遷延其役使王宰領師直趨磁州據魏之右魏帥懼全軍以出又以王宰必有顧望令劉沔領軍直抵萬善示代宰之勢宰即時進兵太原之亂楊辨結中使張皇其事德裕折中使姦言使王逢將陳許易定兵進討太原兵戍於外者懼客軍攻城并屠其家徑歸擒辨盡誅叛卒此皆獨任其策不與諸將同謀大得制御將帥用兵必勝之術上黨既平太尉之命賞其功也德裕懇辭而後受者懼位髙而禍至爾既知其禍何不益修仁德以保功名反益剛強之性取怨於人竟為姦邪所陷是知禍而不知避也夫得位而立大功名人之所難也保其功名人之所易也立功名非天賦大才不能保功名平其心無怨忌足矣德裕能其難者不能其易者惜哉不能駕馭李德裕論曰人君於大臣得委任之道又得駕馭之術則大臣得盡心於事以成勳業而推公於人不敢竊威福矣二者一不可失惟太宗得之貞觀中陳思合上拔士論意間房杜則立行竄逐蕭瑀奏中書門下朋黨則折其妄言竟黜於外可謂能委任矣集中書門下議事必命諫官御史史官隨入或正其失或糾其過或書其非李靖以老疾家居欲復使為將一言於朝靖已起而統兵可謂能駕馭矣使大臣各成功名不敢驕橫其道其術如此武宗用李德裕頗得委任之道故德裕盡其才謀獨當國事時之威令大振者委任之至也但武宗性雄毅觀前朝法令不行紀綱衰替將大振威令知德裕才首命作相德裕謀略動合其意故專任之委任既專權勢自重權勢既重天子始不悅之則怨者得窺其隙而攻之矣彼勢已重而怨者攻之肯帖帖乎必至於禍而後已嗚呼武宗英主知賢相而任之不能駕馭尚致太專之弊中常之主不知人而任之又不能駕馭為害大矣或曰既稱英主賢相何待駕馭而無過答曰君臣之性皆雄毅則鋭於行事而或不思則喜怒有時而過行事不無不平武宗自未免此纍安能察德裕之情德裕於牛僧孺李宗閔輩相怨之久人人所知平上黨之際奏逐僧孺輩明恃成功而報怨僧孺雖非大賢嘗位宰輔矣德裕之言有何顯狀至貶之遐裔宗閔已出逺郡刺史亦不因顯過而流竄御史崔元藻按事有異是舉其職乃不覆驗而黜之栁公權方以才望為集賢學士無故罷職是一徇德裕之意矣任其才從其謀髙其位厚其禮可矣何得一徇其意耶若德裕言人之罪其狀明白固自當從事或不明豈得不詢驗其狀若不然當有所制也有所制則德裕無過矣或曰武宗英主能任大臣而不能駕馭中常之君何以盡委任之道駕馭之術答曰惟至公可矣至公者不以合意悅之而不察其過不以違意怒之而不知其賢人君用大臣平其心如是則委任之道駕馭之術庶幾矣宣宗貶李德裕論曰李德裕以傑才為武宗經綸夷夏屢成大功振舉法令致朝廷之治誠賢相矣但宣宗久不得位又不為武宗所禮舊怨已深德裕是用事大臣自不容矣況德裕性剛少恕不忘怨讎與宗閔輩相排斥凡十數年略無悛意宗閔固姦人常任宰輔為逺郡刺史矣復乘成功之際誣其罪而流竄至牛僧孺雖宗閔黨然有一時名望斥之遐裔物議豈平王涯賈餗之禍本仇士良誣謗中外所知德裕於二人不聞有隙但怨李訓陷已而忿及涯餗子孫避禍於上黨者已為亂兵所害又為敕書實涯餗之罪言已戮其後嗣布告中外夫宗閔已逐涯餗子孫已戮尚聲其罪以快忿心則在朝之人常有不足者得不懼乎不惟不足者懼凡有勢位於朝非大賢至公之人鮮不畏矣蓋大賢至公自知才用不在德裕下彼雖大任我亦能施為或德裕專權不容我之施設但彼之謀國無失足矣何須功效出於我哉此所以無畏也如白敏中令狐綯輩才能望德裕絶逺又固寵保位無至公之心於德裕雖無隙意然德裕用不便於已故乘人主有不容之意盡力陷之也無隙者尚爾常不足者可知矣小節論曰宣宗久居藩邸頗知時事故在位十三年尚儉德以恤人隱謹法令以肅臣下恩厚宗室禮重宰相至於微行以察取士得失焚香以讀大臣奏疏誠好德之君也然知人君之小節而不知其大體懿安太后嫡母也不能盡禮事之反致暴崩為世所駭李德裕有濟時才不能容而逐之令狐綯功德無聞復容子納賄有紊時政至懿宗朝諫臣疏綯之罪曰大中威福又欲行於今日則當時事可知也其河湟歸順夷夏粗安乃承武宗用德裕之後威令已盛而然也不然宣宗用敏中輩於時何所經畫哉至寵次子不定儲位裴休奏請乃曰若立太子朕便是間人此尤昧人君大體也卒至內臣爭立嗣君幾至亂是宣宗區區為善止於小節耳懿宗令狐綯縱賊論曰令狐綯大臣也當同國休戚天下有患可救則力救之況帥淮南一道小冦入境方憂討除未敢為暴部將察其必敗之勢討之甚易不討必致禍亂綯乃曰長淮以南他不為暴聽其過去餘非吾事也豈大臣憂國之意真庸人茍且之見耳尋致大亂屠害十數郡生靈集天下兵討之周嵗方平則綯之罪不容誅矣綯為武宗寵待位極將相一日致國患如此其後罪露懿宗止命罷為太子太保罰典如是何以戒大臣姦雄不忠之罪宜乎天下大勢之去也用韋保衡路巖相論曰唐自天寶而下巨盜繼起時有忠傑將相救世定亂加以元和會昌英主賢臣功業甚盛故厯年滋久大勢不衰懿宗居位固中智以下之才復將相不賢於前世天下日以多事矣兵亂淮徐蠻冦蜀方連年用兵民力困弊於時人君勤勞政事倚任忠賢尚可救時之患懿宗乃用韋保衡路巖作相納賄樹私大紊時政刑殺無辜甚衆大臣忠諫逐之遐裔保衡與巖乘勢陷人恣行貶逐二凶為患中外所憂懿宗方崇奉佛教泰然自安故國政多僻而時事不理賢才既逐而忠諌無聞生民困弊德澤不及於天下大勢自是去矣僖宗鄭畋罷相論曰咸通衰亂之後僖宗童年繼位政在內臣固無逺謀以救世患難雖宰相王鐸崔彥昭有一時名望亦非雄傑之才不能力正時事及鄭畋當政謀議要􅋀多中事機但同列盧携昏庸不忠與內臣田令孜相結沮畋之言不克施用夫巢賊本負販之民非祿山輩但因飢年驅細民劫財物資朝夕之用爾何至成大亂由朝廷衰微邪臣誤計任髙駢宋威輩皆姦險無節爭功忌能玩冦久權養成賊勢賊勢既盛駢以重兵居天下之衝反閉壁自固賴畋作帥於岐以謀破賊振國之威復傳檄諸鎮激以忠義致勤王之師大集關中賊勢既蹙雁門兵至得以平之況僖宗避難之初賊乘勢而西非畋遏其鋭危亂可測乎又以忠謀致諸鎮勤王之舉畋雖去鎮不親平賊其功則由畋也僖宗賞畋之功復命輔政雖在衰世亦秉朝綱令孜凶橫怒畋公正與姦黨誣陷罷之僖宗孱弱不能主張賢相天下之事因無所制國祚必至於亡也李克用討朱全忠論曰巢賊之平李克用為功臣之首雖粗猛之人朝廷恩賞至厚夙性豪雄不無感激可一時倚賴矣全忠出於巢黨力屈來降都統王鐸崇奬過分已受同華節帥不因立功朝廷又與宣武大鎮克用追賊還過其地全忠邀之軍府密謀殺害克用既免不舉兵報怨奏討甚得人臣之體以降賊害功臣是賊心不悛況帥宣武未久凶勢未張本無功名可以贖罪討之正得事宜若乘克用兵鋒詔近鎮助之破全忠必矣凶賊既除使克用感恩可以倚賴諸鎮觀之亦未必敢為相噬之計天下或未至橫流也僖宗懦弱輔相庸暗宦官暴橫一無經逺之謀失此機便卒致諸鎮交亂巨盜肆逆三百年宗社喪於盜手噫昭宗朱全忠篡逆論曰昭宗即位世已亂矣雖尊禮大臣博求賢傑志欲興復而大臣竭忠者杜讓能一人而已其他無不與方鎮相結方鎮藉大臣為援大臣欲固權位亦結藩鎮為重孔緯有一時名望尚與朱全忠交通崔昭緯輩固宜交邠岐矣內外將相不忠天下大勢橫流以至於此昭宗欲何施為乎加之輕信易動動而無謀何以制服諸鎮賊臣也然賊臣之心亦可以恩信結一時之可倚者莫如太原太原有平賊大功爵賞已厚但為全忠所圖蓄忿不解昭宗若加之恩意虜性徑直感恩必深太原順則河東近輔魏鎮舊帥豈有不順之勢數鎮既順使讓能賢相經營於內復引同心之賢贊助時政宦官暴橫者去之姦人害政者逐之朝廷漸治國威可漸振矣奈何不能用讓能之言聽張濬孔緯之計許全忠舉兵致太原拒命太原跋扈賊臣得以脅制朝廷讓能知勢不可為但以死許國可謂大忠矣自是諸鎮交亂車駕不能寧處復留凶逆之人久為輔相與巨盜畫篡逆之計乃亡唐祚哀哉唐史論斷卷下
