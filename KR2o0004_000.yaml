  text: 欽定四庫全書史部十五
  hash: sha256:4a540dfc960a59c2dec4cdfbeae70a4cdb4cf072e21e65c814c7bffa22e3211a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2o0004_WYG_000-1a, image: WYG0685/WYG0685-0639a.png}
body:
  text: 唐史論斷目録史評類卷上召突厥兵立建成為太子殺劉文靜釋裴寂殺劉世讓復置十二軍放宫人即位改元魏鄭公論致治不難中書門下議事使諫官預聞責封倫舉賢定朝廷之制任用房杜殺盧祖尚魏公不避形迹房杜相業魏鄭公溫彥博論處置降虜命李靖為僕射封禪不著於經命李靖討吐谷渾貶權萬紀言利魏鄭公諫諍以髙昌為州縣立晉王為太子親征髙麗劉洎賜死後宫不著名降李績為疊州都督命李績為僕射同中書門下三品褚遂良諫廢立皇后顯慶改元長孫無忌黔州安置殺上官儀乾封改元追尊祖宗自稱天皇后稱天后郝處俊諫令后攝政劉仁軌請李敬元統兵禦吐蕃王師覆敗裴炎請太后歸政太后殺之不稱武后年名狄仁傑薦張柬之為相廢武后韋后安樂公主進鴆帝卷中景雲年傳位皇太子使主細務相姚元崇開元神武皇帝尊號酸棗縣尉袁楚客上疏諫娛樂盧懷慎遺表薦宋璟盧從願用李林甫平章事張九齡請斬安祿山刑罰幾措推功李林甫牛仙客冊忠王為皇太子用聚斂臣王鉷中官輔璆琳稱祿山不反李光弼斬御史崔衆賊陷睢陽害張巡烏承恩為史思明所害九節度使討安慶緒李峴降蜀州刺史僕固懷恩留賊將分帥河北顔真卿降峽州李寶臣為馬承倩所辱復叛李栖筠卒開陵陽渠城原州楊炎貶崖州司馬賜死陸贄論吐蕃疾疫退軍盧杞姦邪李晟論張延賞過惡疑忌李晟宰相崔損便僻固位卷下李絳料魏博事勢用裴度相李鄘辭平章事注意相裴度罷相位失河北韋處厚乞相裴度昭愍遇害貶杜元頴辨朋黨制內臣鄭覃言開成政事不能制內臣殺陳王安王李德裕讓太尉不能駕馭李德裕貶李德裕小節令狐綯縱賊用韋保衡路巖相鄭畋罷相李克用討朱全忠朱全忠篡逆臣等謹案唐史論斷三卷宋孫甫撰甫字之翰陽翟人舉天聖八年進士厯右正言遷天章閣待制河北轉運使兼侍讀甫以劉昫唐書猥雜失體改用編年法著唐史記七十五卷其間善惡分明可為龜鑑者復著論以明焉甫沒唐史記宣取留禁中世遂不得見惟論斷獨傳于後紹興二十七年嘗鋟板于南劍州端平間舊板不存復刻于東陽郡甫生平自重此書至于盥手啓笥曽鞏歐陽修所作墓志行狀及司馬光題跋蘇軾答李豸書亦皆推許甚至朱子語類嘗稱唐論精練說利害如身處親厯之但理不及唐鑑又稱吕伯恭晚年謂唐論勝唐鑑要之也是切於事情只是大綱却不正了云云則極重其議論之精切而惜其不能盡衷於醇正蓋甫生平以氣節自負故所論或不免稍失之偏激然於治亂得失之故指陳鑿鑿實足為考鏡之資讀史者所當與范祖禹唐鑑參觀而互證者也乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐史論斷序古之史尚書春秋是也二經體不同而意同尚書記治世之事作教之書也故百篇皆由聖人立不以惡事名雖桀紂之惡亦因湯武之事而見不特書也但聖賢順時通變言與事各有所宜為史者從而記之又經聖人所定典謨訓誥誓命之文體雖不一皆足以作教於世也春秋記亂世之事立法之書也聖人出於季世覩時之亂居下而不能治故立大中之法裁判天下善惡而明之以王制是聖人於衰亂之時起至治之法非謹其文則不能正時事而垂大典矣此尚書春秋之體所以不同也然尚書記治世之事使聖賢之所為傳之不朽為君者為臣者見為善之效安得不說而行之此勸之之道也其間因見惡事致敗亂之端此又所以為戒也春秋記亂世之事以褒貶代王者之賞罰時之為惡者衆率辨其心迹而貶之使惡名不朽為君者為臣者見為惡之效安得不懼而防之此戒之之道也其間有善事焉明其心迹而褒之使光輝於世此又所以為勸也是尚書春秋記治亂雖異其於勸戒則大意同也後之為史者欲明治亂之本謹戒勸之道不師尚書春秋之意何以為法至司馬遷修史記破編年體創為紀傳蓋務便於記事也記事便則所取博故竒異細碎之事皆載焉雖貫穿羣書才力雄俊於治亂之本勸戒之道則亂雜而不明矣然有識者短之謂紀傳所記一事分為數處前後屢出比於編年則文繁此類固所失不細殊不知又有失之大者夫史之紀事莫大乎治亂君令於上臣行於下臣謀於前君納於後事臧則成否則敗成則治之本敗則亂之由此當謹記之某年君臣有謀議將相有功勳紀多不書必俟其臣歿而備載於傳是人臣得專有其謀議功勳也尚書雖不謹編年之法君臣之事年代有序羲和之業固載於堯典稷契臯䕫之功固載於舜典三代君臣之事亦猶是焉遷以人臣謀議功勛與其家行細事雜載於傳中其體便乎復有過差邪惡之事以召危亂不於當年書之以為深戒豈非失之大者或曰春秋雖編年經目其事傳載本末遷立紀傳亦約是體故劉餗史例曰傳所以釋紀猶春秋之傳焉此可見遷書之不失也答曰春秋聖人立法之書也立法故目其事而斷之明治亂之本所目之事或一句或數句國之典制罔不明人之善惡罔不辨左氏史官也見聖人之經所目之事遂從而傳之雖不能深釋聖人之法記事次序一用編年之體非外春秋經目獨為記也遷之為紀也周而上多載經典之事固無所發明至秦漢紀並直書其事何嘗有法紀無法傳何釋焉此乃餗附遷而為之辭也或曰史之體必尚編年紀傳不可為乎答曰為史者習尚紀傳久矣厯代以為大典必論之以復古則泥矣有能編列君臣之事善惡得實不尚僻怪不務繁碎明治亂之本謹勸戒之道雖為紀傳亦可矣必論其至則不若編年體正而文簡也甫嘗有志於史竊慕古史體法欲為之因讀唐之諸書見太宗功德法制與三代聖王並後帝英明不逮又或不能守其法乃有荒縱狠忌庸懦之君故治少而亂多然有天下三百年由貞觀功德之逺也唐書繁冗遺略多失體法事或大而不具或小而悉記或一事别出而意不相照怪異猥俗無所不有治亂之迹散於紀傳中雜而不顯此固不足以彰明貞觀功德法制之本一代興衰之由也觀髙祖至文宗實録叙事詳備差勝於他書其間文理明白者尤勝焉至治亂之本亦未之明記事務廣也勸戒之道亦未之著褒貶不精也為史之體亦未之具不為編年之體君臣之事多離而書之也又要切之事或有遺略君臣善惡之細四方事務之繁或備書之此於為史之道亦甚失矣遂據實録與書兼采諸家著録參驗不差足以傳信者修為唐史記舊史之文繁者刪之失去就者改之意不足而有它證者補之事之不要者去之要而遺者增之是非不明者正之用編年之體所以次序君臣之事所書之法雖宗二經文意其體略與實録相類者以唐之一代有治有亂不可全法尚書春秋之體又不敢僣作經之名也或曰子之修是書不尚紀傳之體可矣不為書志則郊廟禮樂律厯災祥之事官職刑法食貨州郡之制得無遺乎答曰郊廟而下固國之巨典急務但記其大要以明法度政教之體其備儀細文則有司之書各有司存為史者難乎具載也自康定元年修是書至皇祐四年草具遂作序述其意更俟刪潤其文後以官守少暇未能備具逮嘉祐元年成七十五卷是年冬卧病久慮神思日耗不克成就且就其編秩粗成一家況才力不盛叙事不無踈略然於勸戒之義謹之矣勸戒之切而意逺者著論以明焉欲人君覽之人臣觀之備知致治之因召亂之自邪正之效煥然若繪畫於目前善者從之不善者戒之治道可以常興而亂本可以預弭也論九十二首觀者無忽不止唐之安危常為世鑒矣宋尚書刑部郎中充天章閣待制兼侍讀許州孫甫之翰撰
