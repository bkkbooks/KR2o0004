body:
  text: 唐史論斷卷上宋孫甫撰高祖召突厥兵論曰義師之起本於世亂若威徳漸盛則四夷欵附矣故周武興師致庸蜀羌髳微盧彭濮之衆助牧野之戰漢髙平定天下亦有北貊燕人梟騎之助今唐師方起當以徳義為勝何乃聽文静一時之謀遽求助於突厥斯自小也財寳金帛皆民力所致當舉義之始許之夷狄可乎不盡賂之又自失信後突厥恃其微功連嵗入冦葢由兹失策也立建成為太子論曰立太子必嫡長者使天下之心有繫以止争奪之患也行之乎世固為常法若夫大公之世子不賢尚求聖人以傳大位況長子不賢次子聖乎安得局於常法也唐有天下本秦王之謀秦王功徳之大海内屬望其勢可終為人臣乎建成自舉義以來無一事可稱道但以年長使居聖子上至愚者知其不可也雖秦王以常禮讓胡不虛其位待天命之歸況受禪之初天下未定何汲汲於立太子也善哉寧王憲讓太子之言曰時平則先嫡長世難則歸有功此萬世不易之論也殺劉文静釋裴寂論曰恩與刑人主之大權也恩當其功刑當其罪則中外勸戒矣反是道何以服人心裴寂劉文静俱以佐命為大臣文静才略功名過寂逺甚髙祖任情親寂而疎文静文静失律則除名及與寂有隙出怨言遂聽寂讒殺之寂當將相之任怯而無謀屢為賊敗既入朝不加深罪幸矣顧待彌厚可乎施恩於寂太優用刑於文静太暴二者皆出於私非聖子功徳之大人心去矣殺劉世讓論曰兵之用間為神妙者以其術之不可窺也髙祖厯戰伐多矣用兵之事不可謂不曉劉世讓素有忠義之名既以知邊機使備突厥方制其要害功效甚明突厥使人入朝言世讓有異謀殊不知世讓既荷任用已有功效何故與突厥通謀況突厥入冦本以馬邑為便今得其地守之是扼其入冦之路也世讓經畫如是戎人反言與己國通謀其情固易察耳髙祖不察而殺世讓何昏之甚也復置十二軍論曰國之用武固常事不可一日懈也中夏之廣外夷之衆雖太平之世黠惡者畏威服徳而不敢動其心常幸國之有事起而為患爾則武備可一日懈乎況大亂初定人心未寧便欲為安逸之態而偃武事及突厥入冦乃謀遷都以避經世之略何其淺也賴秦王堅議不行謬策令復置十二軍以教諸府之兵中國之威自此盛矣太宗放宫人論曰古之明王嬪御之數著於經典者可見也漢之後宫及千數賢如魏桓者不肯出仕矣葢人君廣置嬪御其損有三侈費甚也内寵多也怨女衆也侈費甚則困民力内寵多則競私謁怨女衆則傷和氣人君之徳所損如是賢者以為難諌正而不願仕也況隋煬荒虐自古無比强取良家女置後宫者固無其數髙祖初入闗放離宫之人還親屬此得美事之一節及受禪安然有其後宫欲不荒恣得乎賴聖子承之立矯其過計出三千之衆使天下聳動歌詠唐之盛徳也即位改元論曰或問春秋書國君即位必於元年正月明新君踰年即位改元也此書即位踰年豈春秋之法乎荅曰尚書記天子傳位改元之法舜則曰月正元日禹則曰正月朔旦春秋即位改元之法本於此聖人以舜禹之法為天下之至正也然顧命康王之語記成王崩康王既為天子乃釋冕反喪服葢以先君不書所終之年天子即位不可一日而虛故於柩前即位明先君傳授之意不及行舜禹之法也但踰年稱君改元亦同其道矣以天子不待踰年即位則諸侯可知也春秋一國之史聖人修之遂見天下大法莫若舜禹至正也元年初即位説者引康誥之文為定以謂新年正月必改元正位百官以序國史書即位以表之此雖明不待踰年即位元年見新君之法不知聖人因而存舜禹之道也況魯侯即位雖稱元年必書王正月者上以明王道之序下以見諸侯奉王制而即位也若夫修天子之史可不知書元年即位之法乎又後代事艱天子繼統必待踰年稱君勢有不便矣故當依實書之雖略變古法其曰以即位踰年改元亦所以法尚書定位春秋改元見新君之意也魏鄭公論致治不難論曰帝王興治之道在觀時而為之觀時在至明至明在至公至明則理無不通至公則事無不正通於理故能變天下之弊正其事故能立天下之教弊變教立其治不勞而成矣孔子曰如有用我者期月而已可也三年有成則聖人之意可見矣或曰孔子言善人為邦百年然後勝殘去殺又言王者必世而後仁何謂也荅曰孔子教為邦者久之之辭也為邦若非聖哲或行仁政未能變通時事功業不速必中道而止故教以久行仁政乃有成功也若以聖哲之道則期月可也但後之為天下者雖欲興起治道多非聖哲之才不能通究時弊以道變之務速其功以行一時之事故所為駁雜莫復前古之治也觀魏公之論誠得聖人之意文皇能納其言而不惑姦人之論力變時弊以行王道嗚呼明哉大亂之後興立教法不急其功致時太平徳流於後嗚呼公哉中書門下議事使諫官預聞論曰太宗之任諫官真得其道夫天下之務至廣也軍國之機至要也雖明主聽斷賢相謀議思慮之失亦不能免一失則為害不細必藉忠良之士諫正夫忠良之士論治體補國事乃其志也能宻有所助則亦志伸而道行豈必欲彰君過而取髙名哉當君相議事之際使諫官預聞得以闗説或有闕失從而正之天下但覩朝政之得宜不知諫者之何言上下誠通國體豈不美乎況大臣論事以諫官規正於人君之前安有不公之議兹亦制御大臣使之無過之術爾若以諫官小臣不可預聞國議必衆知闕失方許諫正事或已行而不可救過或已彰而不可言故剛直之臣有激訐不顧以争之者君從之猶掩其過君或不從則君之過大臣之罪愈大矣太宗任諫官可謂得其道責封倫舉賢論曰封倫真姦人太宗真能照姦人之情者也大臣之職薦逹人材固非細事天下之大中外乏任可容一日之才乎然人之才有能有不能器而使之衆職舉矣豈有人主責其舉賢己未嘗推薦但言無竒才異能上欲欺主之明下欲蔽天下之善此真姦人也葢姦人不樂進賢其情有三保位固寵常懼失之以賢者既用必建立功業掩己之名見己之過名滅過露則位不能保寵不能固此不樂進賢之情一也又姦人立私必人附己乃引之賢者懷才安命進退以道固不肯趨附姦人以謂不附己而引之則不知己之恩不知己之恩則不為己之黨此所以不樂進賢之情二也姦人無至公待人之心心既不公知人不明雖遇賢才不能深識慮引而進之或有大過為己之累此不樂進賢之情三也封倫之情正在於此太宗以前代未嘗乏人折之使慚懼無辭可謂能照姦人之情者也國有姦如封倫者世世不無人主能照其情而責之則公卿悚動賢者進矣定朝廷之制論曰太宗定天下之功固天擅神武英才不待賛論而赫赫於無窮矣其朝廷之制又如是宜乎貞觀之治也夫定官之員不務多而務擇賢則不賢者安得用矣大臣議事使諫官御史史官並從而入或正其失或糾其非或書其過則大臣安敢不正議矣諸司長官正衙奏事使衆臣共聞之屬官不得奏本司外事非至公之事人不敢言則隂邪之事自絶矣踈賤之人言事者令門下司引奏又置立仗馬以備急事則天下之情無不逹矣内侍皆黄衣給事宫掖則姦人無所附而事權不假於人矣數者皆朝廷大法為人君者能遵行之雖未能及貞觀之治朝廷必尊而天下可治也何哉官少而賢必擇之精也大臣不敢曲議必聽之明也諸司官無邪言必制之公也言事者無壅而人情盡逹必采之詳也内侍不預事必制之嚴也數者非太宗英睿不能盡其道人君資性至此者鮮矣然設官少而務擇賢使諫官輩預聞大臣之議而救其失諸司奏事明陳於庭使賤者言事無壅不任内侍以事必久其制而力行之雖不逮太宗之英睿朝廷豈不尊天下豈不治也任用房杜論曰人主之任大臣不可不專亦不可專若深知其人可付國事不專任之何以責成功葢任專則責重責重則人必盡其才力也若知人未至而專任之茍無成功則有敗事又或竊擅威福有難制之患二者惟在人主審之不可一失失則事機難追矣太宗可謂能審任人之術者也知房喬杜如晦之賢而付以國事房杜方盡心職事已著功效陳師合以平常之見欲移主意如晦奏其事意似不廣然慮小臣間言漸害於事故言之爾太宗不惑師合之言喬如晦荷信任如是敢不盡其才力乎此所以成太平之治也然有太宗之明房杜之賢則可以專任而不容人言人主知人未至當審其付任不可執此以為法殺盧祖尚論曰人主操天下之勢不可一日失威令威令一失則下起慢上之漸漸若不止則綱紀弛而權移於下何以操天下之利勢故曰人主不可一日失威令也然威令之行不可過中過中則暴暴則人心離矣太宗之用威令誠得其術故内外之臣聞一令罔不靡然從之此無他聰明之性至公之心剛嚴之體御於内外也盧祖尚丁其時荷其任乃委曲思慮以身為計遂成驕慢之態宜乎獲罪矣然殺戮刑之極施於驕慢之罪此似過中人臣驕慢則殺之復有罪之極者何以加刑若祖尚之罪逐於遐裔而永棄之未至失威令也魏公不避形迹論曰人臣之任國事莫若知無不為一存形迹非公忠之道也且如有賢才滯於下或己之親舊也或權勢之親戚也以此避嫌而不舉又如臣下忤犯主怒枉為人譛將被刑戮將行竄逐其人或己之親舊也或權勢之親舊也以此避黨而不辨又如有姦惡之人將為國患其人或己之所不足者或權勢之所不足者以此避疑而不言凡此之類皆存形迹也人臣存形迹為身之謀爾非所以為國計也夫有賢未用國之失也殺逐無辜君之過也姦人將起時之患也為人臣者知國之失而不陳見君之過而不正觀時之患而不救但曰我存形迹此罪不細故謂非公忠之道也温彦博因魏公為人所譛遂言人臣須存形迹此不忠之言也賴魏公自陳太宗尋悟其事非君臣相信㡬失大公之道房杜相業論曰或問房杜之相謀議施為不見赫赫之事而世大賢之何也荅曰宰相之功何必赫赫觀時事如何耳房杜自秦府遇主講天下事固詳太宗即位遂命作相付任之專不與他相同乃得盡心助治致時太平以事明之其功可見宰相之任莫先乎正官職用賢才若官得其才宰相總其大要庶事舉而天下治矣貞觀元年房杜定文武官六百四十員官既少則才可擇才可擇則官不濫官不濫則職自舉況公於取士各盡其才以房杜得佐主興治之要道也以至臺閣規模典章文物皆其所定又防姦邪抑權倖各有著法大槩如此不惟一時之治固足以垂憲於後也其他軍國機務雖謀議不著每籌事太宗從之以太宗之英睿專任二相而從其所籌其賢又可知也即貞觀時事之治二相之功可見矣或曰貞觀四年天下大治太宗惟稱魏公之力不及房杜何也荅曰貞觀之初太宗求治方切魏公專論王道封倫横議以沮之太宗不惑姦言力行王道及天下之治也嘉賢人之論足以明道故稱魏公之力嫉小人之言惜不能使之慚悔故恨封倫之不見其言自不及房杜也然魏公議臣也房杜宰相也魏公論其治體房杜助其施為爾後世賢房杜而不見其功者惟詳觀太宗專任之意貞觀時事之要可也魏鄭公温彦博論處置降虜論曰安邊之術其難哉以太宗之英明魏公之辯論豈不能察夷狄之情定安危之計何至納温彦博曲議處虜内地仍擇酋長備官京師慮之不審乃如是乎夷狄之態弱則仗人强則為患禮義不能移其性仁恩不能懷其心從古而然也頡利之敗其部落之降者豈慕徳義而來正為逃死之計耳置之塞外分酋長以立之足示好生之徳何過處置有差也葢太宗以雄才大略平突厥意破亡之餘不能為患但以大度畜之至仁懷之夸大盛徳以示萬世故忽其事也不然彦博之議突厥餘衆若遣居河南綏懷徳恵終無叛逆此固妄言豈能惑其聰明哉及數年有變始徙降戎塞外乃悔今日之失也命李靖為僕射論曰太宗之明李靖之賢君臣之心可無間矣況靖深入虜地方成大功安得容讒人之言且謂靖軍無綱紀致以虜中竒貨散於亂兵之手此不識事體之言也靖善用兵法令素整以少精騎深入虜中無綱紀安能成功乎虜中竒貨若果有之散之兵衆正得其宜突厥凌中國久矣一日平之張天威雪國恥安邊寧人非靖盡心兵衆盡力何以成此功且寳貨散之軍衆是上不奉君欲下足恩衆心吾謂正得事宜但不知寳貨之有無爾太宗為君何至以竒寳為意猜疑賢將尚賴仁明之徳不行重責靖之忠誠無所觖望不然君臣之間兩有大過矣及數月始悟其事命靖為相亦足光其功徳宜罪讒人以戒於後世可也封禪不著於經論曰封禪之文不著於經典秦漢諸儒用管仲説以為帝王盛徳之事無大此禮故秦皇漢武行之儀物侈大自謂光輝無窮然封禪之後災異數至天下多事葢繁費生靈干動和氣所致則崇尚此禮惡足以當天意哉況此禮不著於經典也司馬遷作封禪書引經典之文但巡守之禮耳帝王巡守每至方嶽必燔柴以告至非謂自陳功於天也帝王治天下能以功徳濟生民致時太平則天必祐之以永久之福郊祀之禮足伸其報何待自告其功也太宗謂事天至誠掃地足以致敬何必登山封數尺之土此實至論命李靖討吐谷渾論曰天子善任人而能主威柄則大臣不驕大臣不驕則中外自肅太宗以吐谷渾拒命一日謂侍臣曰欲李靖為帥討之靖功名之大為當世勛臣首方以老病居家聞其言亟見執政請行太宗使大臣如是功名不逮於靖筋力未衰於靖者敢驕慢乎人臣不敢驕慢則各盡才節人臣各盡才節天下事不足治矣天子使人至是者無他善任人而能主威柄也貶權萬紀言利論曰觀太宗罪萬紀言利真得天子之體天子為天下所尊非止威勢之重由仁徳之髙也仁徳之本莫大乎愛民愛民之要莫先於節用用之有節天下貢賦之入嵗有餘矣何至殫山澤之利以困人力乎然自三代之衰秦漢而下人君好利者多由所為侈大而用無節也天下貢賦之入不足以充其費姦人得以言利矣人君顧所用不足必説其言而從之好利日甚人力必窮人力窮則危亂自至縱未至危亂天子言為令動為法以好利聞於天下豈有其體哉太宗斥言利之臣無他能自節用外謹制度絶權倖無過費耳貞觀一朝其事可見初出宫人三千天下固已頌其仁愛及宫中欲修一殿則想秦始皇之過不起其役體不耐熱公卿請營二閣以避繁暑亦念漢文罷露臺之意不從其請將幸東都勅預修乾陽殿給事中張元素極言隋室修乾陽勞民之事嘉其言立止出降長樂公主勅有司資送倍於長公主魏鄭公引故事言長公主尊於公主豈得以親愛資送厚於長公主上納其言遂不越禮其設官之制命宰相定其員位文武官止六百四十員多得才能而無冗食其養兵之法畿内及諸路府兵止六十萬惟元從禁軍三萬及府兵畨兵或出征者有所給外皆散之農畝而養焉其行賞之事功者厚賢者禮内無嬖人私其恩外無倖臣竊其澤天下嵗入之物有餘用矣故薄賦歛厚風俗其道徳與前代聖主並所為有天子之體矣嗚呼為天子者皆可以至是可至是而不至者由所為侈大制度不立權倖不抑所致耳所為侈大物力固難以給若制度不立則庶事無節而冗費益甚權倖不抑則姦人競附而私恩益廣天子雖獨尚儉徳亦何能省用太宗自節其用復能謹制度絶權倖所以不取山澤之利不困生民之力而財自豐為天子而得其體著仁徳於無窮也魏鄭公諫諍論曰魏公以忠直稱厯數百年而乃愈髙李翺論修史之法則曰假如傳魏徴但記其諫諍之詞足以見正直是魏公得諫諍之道其言足以傳信於後也貞觀十年魏公三上疏乃諫諍之著者然不過諫侈逸明任人平刑賞辨忠邪及引前代治亂為説未嘗深言君過亦不及安危大計詳味其意尤見當時髙致夫不深言君過君無大過也不及安危大計君能自主威福了天下大事也君無大過能了大事真英主也但政有小失則諫之引前代治亂為戒使不至於甚此所以為忠也魏公事英主力賛治道已成太平之治見其小失尚孜孜諫諍以防其甚如事中常之主天下未治其君或有大過魏公之諫必危切至安危大計必忘身以争也葢輔相之道不至此不足以為忠魏公之心後之為相者宜詳之以髙昌為州縣論曰中夏之於四夷天分内外之地也故嗜好不同服用不類禮義不能化人情不可通地形險固自限其所帝王能以徳服而威制之常使不為中夏患則上策也安可恃盛大之勢因夷狄拒命而伐之遂强有其地一强有其地不惟中夏之人苦戍守之勞又使諸戎謂中夏利其土壤各懷恐懼俟時乘隙合從為患矣以太宗威勢州縣髙昌之地雖保無他魏公尚以為不可則帝王威勢之不逮太宗者慎無貪戎土以起大患也立晉王為太子論曰王者立太子以嫡以年以徳固有常理若嫡與年者或昏庸或過惡固不可不擇於諸子也擇之之法取衆望決己意則天下歸心矣太宗英主也斷大事未嘗有疑晚年牽愛不能定一子泰長而有過立晉王無疑何至投牀自苦取決於無忌之言太子君之副社稷之本豈使一臣立之仍命拜謝賴太子良善人情可屬無忌終不擅其恩不如是必起亂階矣親征髙麗論曰貞觀中天下治平四夷賓服天子威徳甚盛太宗練兵帥尚功名其志甚銳以此不衰怠之意臨天下可預防患難求保太平之業也但因一逺夷之臣殺主害民復侵陵鄰國詔罷兵不聽然彼有罪豈預中國之事命一二將帥出師境上示征討救援之勢使畏威懷徳足為天子能事何至決親征之計乎忠賢交諫莫非苦言李勣一議堅不可動遂舉中國數萬之衆驅之異域輕其性命已似忍心況以萬乘之尊與逺夷争勝又自輕之甚雖平遼東數城破延壽大軍何足益其威徳若延壽納對盧之計危可測乎此葢太宗英雄自恃忽於深慮李勣順意生事遂成誤計且初議伐遼褚遂良諫止其事太宗然之勣至追述延陀犯邊聖策本欲追擊由魏徴苦諫致失事機以此激之遂定親征之議及敗延壽之衆太宗下馬謝天則危心可知矣語從行軍人戰死者加勛級牓殯地則中國士衆殞命於逺夷可知矣天子荷宗廟社稷之重為天下生靈之主一旦不因中國之事履危難輕人命威徳無乃損乎且李勣追咎魏徴諫擊延陀事謂之失策如延陀犯邊太宗命將禦之大破其衆以示中國之威不追擊之亦未為失髙麗本不敢犯邊何至親征乎勣順意生事無以逃其罪矣房喬忍死上表懇諫伐遼賢哉劉洎賜死論曰劉洎之死據舊史所書由褚遂良之譛也然伐遼之行太宗諭洎輔翼太子之意洎有誅大臣之對時已責其踈健太宗至自遼東不豫洎謁見而深憂之復言誅大臣事亦與前踈健之語何異儻為遂良所奏太宗叠前怒殺之迹其事狀近於是矣若洎止憂聖體絶無他語又引馬周自明周對與洎不異太宗何至偏信遂良遽誅大臣乎況洎有罪而周隱之又安得止罪洎而不責周也葢遂良後諌廢立皇后事以忠直被譴姦人從而譛搆之惟恐其無罪故劉洎之子訴寃李義府助之賴樂彦瑋力辯其事遂良譛洎之言當出於此矣又貞觀實錄本敬播所修號為詳正後許敬宗專修史之任頗以愛憎改易舊文則遂良譛洎之事安可信乎後宫不著名論曰帝王於後宫恩寵過厚非賢徳者鮮不干預時事著名於外葢寵過厚則言易入言易入則事可動後宫至可動帝王以事則姦邪附之著名於外又況親族竊恩競為氣勢内寵至此小則破家之禍大則為國之患必然之勢也太宗在位嵗久後宫不無寵嬖但外不聞何人耳惟徐充容以恩顧稱絶不干預外事復能諌諍君失則貞觀宫闈之政可知矣後代不能遵守神龍中上官昭容等招權於外廣植姦黨天寳中楊貴妃專勢於時務强親屬國事既亂數婦人及其家皆不免誅戮噫上世淳風既往人主之尊為天下所奉制度必如古簡朴或不能則宫室服用既過於古矣雖英明之君為外物所誘必有侈樂之意意有侈樂於後宫豈無所嬖寵在人情未為大過也既嬖之居處服玩充其欲足矣何至容其私謁以干國事使戚屬倚之以作勢姦人附之以竊權氣燄既成必生禍患而後已則人君於後宫或有嬖寵能以貞觀為法不惟不使亂政亦所以安全之也降李勣為疊州都督論曰君待臣以道臣以道報之君待臣以利臣以利報之此厯代君臣之常理也太宗用李勣有本有末其謀謨智力立功立事為大臣固宜然以勣能不負李宻尤信其心使輔太子正為此節勣雖髙勲重望位尚書預中書門下事寵已至矣使輔太子敢不盡力乎何至無故譴逐使太子他日授以僕射且人受恩於父兄未有不厚其子弟者況天子以大位授人又寵信之豈於太子不盡力耶然勣忠義之士但風氣英豪非感激不能盡節一日無故逐之使不無怏怏太子雖授以僕射勣之機心豈不曉其利誘乎至廢立皇后之際不肯盡忠雖勣無大臣節亦太宗以利啟其心也髙宗命李勣為僕射同中書門下三品論曰唐宋魏晉而下厯代任宰相之制以僕射侍中中書令為正宰相故僕射二品侍中中書令三品同中書門下三品由李勣自尚書授詹事詹事卑於尚書藉其輔翼太子故授之同中書門下三品者得預聞國政此侍中中書令之任也今勣授開府儀同三司又改授僕射品已髙而曰同三品故蘇冕㑹要駁其事曰李勣遷開府儀同三司又改僕射開府從一品僕射從二品今反同三品者豈不與立號之意乖乎杜佑通典曰同中書門下三品當以階卑官髙令所給祿秩同品耳據此似非位署後同三品者止記初命率不以為位號也褚遂良諫廢立皇后論曰髙宗即位數年奉先帝成法以臨天下頗得守文之體一日昏惑自恣不奉天戒雖前代荒亂之主少過之者天子之貴嬪御之衆何至私先帝才人使逞隂譎之計搆陷中宫為國大醜且髙宗自晉邸升皇儲即位之年地震於晉久而不止是必天意以隂盛為戒也夫太宗臨終顧無忌遂良稱好兒好婦是以國家事付託於大臣也武氏詭計初行方議廢立遂良以死争之是不負先帝付託也嗚呼先帝付託於臨終天地示戒於連年大臣力争於所議稍近中常之主當知事理甚明不可不念況髙宗㓜為聖父教訓正人輔導豈全不辨事理乎但内惑嬖者之計外納姦人之言上不奉天戒次不遵父命下不顧忠議徇一時之欲以至於此心知王皇后無辜而憫之及為嬖者戕賊亦卒不問此又孱懦之態甚矣使文武之臣蕃夷之長共朝嬖者此又亂禮之甚前代未之有也卒使嬖者擅人主之權害宗室殺大臣㡬移宗社實髙宗之過也然髙宗之過雖姦黨所賛亦由李勣微言于志寧顧望所致耳李勣荷先帝付託于志寧任宰弼之重若稍助遂良及無忌韓瑗來濟之言姦黨豈能動乎是極諫髙宗之過者遂良也成就髙宗之過者李勣志寧也故書曰右僕射河南郡公褚遂良諫廢立皇后降潭州都督書其官爵明大臣之任也諫廢立明廢者不當廢立者不當立也因諫而降明無罪也遣勣志寧立皇后不書其官但名之明勣志寧無大臣節賤之也書臨軒立后而不曰帝見髙宗無人君之體也顯慶改元論曰人君即位之年謂之元年元始也人君布政自此始故首月謂之正月取其正始之義也厥後以數繼之終於一世此前古不易之法也至漢文惑方士之言改後元年始變古制孝武因事别立年名厯代帝王皆遵尚之唐武徳貞觀雖為年號亦終其身髙宗不奉祖宗之法且在位七年矣而謂之元年於理安乎若以立太子之始得以改元不知天下事統於天子乎太子乎事不師古而至於此曰大臣昧於經義也長孫無忌黔州安置論曰人主之惑讒言由不知其人為蔽耳髙宗於許敬宗非不知其人也如敬宗修太宗實錄移威鳳賦事髙宗明知不足傳信修史尚髙下其手他事固不可信矣鞫獄之際所嫉之人事外言其大罪豈得信乎況無忌親則元舅位則三公忠亮之誠許國甚至一姦人譛之不自臨問遂竄遐裔此非不知敬宗之誣謗無忌之非辜正欲快嬖者之意使元舅以勲徳重望寃死遐徼不惟昏塞之過實不仁不孝之甚也殺上官儀論曰易有君不宻失臣之戒春秋有君漏言之譏聖人立法使人君與臣下謀議不可輕脱漏露致罹其患故申於易著於春秋丁寧如是也況君乘怒自謀使臣預議一日推過於臣而殺之豈人君之道髙宗立武后過惡甚矣后延邪人行厭勝決廢之固宜方與上官儀定議后遽自申訴兹以不宻所致若便行廢黜后亦何所為反懼后怒言儀教我此乃婦人童子之態遂使姦人乘后之意搆皇太子大臣殺之士大夫無事被逐者甚衆后威權日盛養成簒奪之勢皆由髙宗不君也乾封改元論曰太宗以功徳平治天下其朝廷之事則賢才在位法度施設其生民之樂則刑罰㡬措嵗時屢穰其四夷之服則大者來臣小者安帖前古聖王之治何以加焉尚謂封禪盛徳之事慮己所為未當天心終不行其禮髙宗在位十餘年雖賴先帝遺徳生民安業四夷不動奈朝廷之事姦人亂政忠賢竄戮太子廢殺臨朝聽斷則中宫垂簾威福不專於巳此大亂巳見有何功徳可以告成葢徇后之欲舉希闊儀物誇耀天下耳登封之後嵗饑民困日食彗見連年不已豈非功徳之薄妄告於天又千乘萬騎之行勞費民力干動和氣所致與姦人預慮天時不順先引漢乾封故事建為年號若以嵗旱為乾封則民之饑困災變頻仍是果天祐哉為天下者切戒於此勿輕議盛徳之事追尊祖宗自稱天皇后稱天后論曰諡所以尊名也古之天子諸侯卿大夫善名雖多惟取一大善為稱不使名浮於實也厯代帝王諡號或實或虚不能盡如古制然必以祔廟之始一二字為定也唐髙祖起義兵雖出太宗之謀然親平大亂成就王業諡武宜矣太宗以武功定天下即位之後行王道致太平推誠人心㡬致刑措綱紀號令與治古同諡文宜矣今髙祖曰神堯不惟越禮適所以辱之髙祖於堯之道安可擬議況稱曰神堯人必謂其名不稱既知不稱豈非辱之太宗加武與聖此不謂過但廟號久定而増其名又豈禮乎二后號神聖尤乖其實孟子曰大而化之之謂聖聖而不可知之之謂神豈中宫之位可當其號此武后自欲尊大妄稱天后髙宗遂稱天皇因追尊祖宗二后用掩其迹嗚呼天子徇后之欲僣大其稱凟祖宗亂典禮此髙宗之過也髙宗之過亦由大臣有司不守經義逢君之惡所致爾郝處俊諫令后攝政論曰處俊諫髙宗不令武后攝政可謂社稷之臣也自上官儀被殺髙宗為后所制奪其威權内外畏之無敢忤其意者髙宗雖因目疾欲令攝政亦勢逼而然處俊不顧禍患懇諫其事至引魏文不許皇后臨朝為證是時處俊之心止知有社稷之計不知有身計也言既激切又得義琰為助雖昬主悍后義不能違夫人臣事君見大過而不敢言臨大節而不敢當者正欲保位避禍也處俊當后擅權上下危逼之際忠言確論力救其事義琰協心助為之言二公終保大位不罹其禍如于志寧輩預廢立皇后之議顧望不言乃保位避禍之意也然終不免譴黜一刺史而殁但得畏懦不忠之名為世所罪又豈能保位避禍乎然則事君者固不可自計利害也邪正在於所守禍福繫於所值所守者節也不可不固所值者時也此不可必惟能不失忠義大節則窮通死生賢矣劉仁軌請李敬元統兵禦吐蕃王師覆敗論曰王者能知人能駕馭臣下則不敢欺矣將相不忌賢不私怨則國事濟矣李敬𤣥不練邊事與劉仁軌立異此廟堂之上恥所不能忌其賢而違其議也仁軌知李令非將帥才決請鎮守使之敗辱此恃其功名欺君以逞私怒也髙宗不察李令不能統兵但徇仁軌意遣之尋致兵師敗衂自損國威此昧於知人之明矣馭臣之術一舉而君臣之間俱不免過然仁軌之過大矣中宗裴炎請太后歸政太后殺之論曰裴炎死雖由直議迹其本末自取之也武后簒奪之勢非一朝一夕為之方欲因事立威以震懾中外然後行其所謀中宗即位之初過寵后父炎力争之因有讓國之言葢一時忿激之詞也炎諫於外武后制於内一孱主豈能有為何得因一時忿激之詞便謂不堪輔佐遽行廢立葢炎自以忤意預憂禍及遂附武后為之謀爾殊不知后既能廢帝立少子天下之權皆出於已其勢至此事肯已乎況素有異謀也炎方區區諫正其過又請復政少子盜欲取人竒寳已預其謀既使得之乃以亷恥為責令歸其寳言得從乎言既不從禍可免乎故曰炎之死亦自取之也夫為人臣者雖當盡力於事在擇主之正與不正爾主不正而盡力鮮有不罹其禍者葢共事之時知其計畫所長用心所向得志之後必慮復與人謀則不利於己故有忌之之意炎與劉禕之程務挺輩相繼被戮皆自取之也不稱武后年名論曰武后僣竊位號唐史臣修實錄撰國史者皆為立紀繫后事於帝王之年列偽國於有唐之史名體大亂史法大失矣後史臣沈既濟奏議曰中宗以始年登大位季年復大業雖尊名中奪而天命未改足以首事足以表年昔魯昭公之出也春秋嵗書其居曰公在乾侯君雖失位不敢廢也今請併太后紀合中宗紀每於嵗首必書中宗所居曰某年春正月皇帝在房陵太后行某事改某制則紀稱中宗而事述太后庶名不失正禮不違常此得春秋之法足正唐史之失也故從其議書武后事於中宗紀中武后改年皆是妄作今起嗣聖繼以景龍武后所改但存其名備證它事而不以表年焉所以正帝統而黜僣號也狄仁傑薦張柬之為相論曰觀武后用張柬之見其任賢之術也武后臨朝僣竊二十餘年所用之人姦正相半葢后俊智之性有過於人謂不用姦人無以成己欲不用賢人無以庇己過然持大權者多賢才也如狄仁傑姚元崇相於内婁師徳郭元振將於外天下事何慮乎故雖兇殘不道不至禍敗者以此也當仁傑崇相國才謀之士不足於時尚孜孜訪於二相求大才以備任用二相力薦柬之立命作相其推心不疑如此則向之任用之意可知矣豈非得任賢之術也一婦僣天下大號恣行㓙虐尚以大權付得其人久不禍敗為人君者能推誠任賢天下豈有憂患乎廢武后論曰舊唐史書武后傳位於中宗葢史官諱其事也然桓彦範傳書武三思以武后為彦範等所廢常深憤怨又於武后實錄書彦範請太后復辟卧不語事是廢之為實今迹其實事書柬之彦範等遂廢武后所以明大法也唐之天下髙祖太宗之天下也髙宗傳受於祖宗及其崩也以子託后后擅威權乃逼奪其位僣竊大號恣行兇惡毒流内外踰二十年不道至此若終身無禍何以作戒於後況實廢之安可諱也若以中宗武后之子也彦範等奉子而廢母於事不順是不逹其理春秋莊公元年三月夫人孫於齊此莊公之母也以悖亂之事去其氏貶之則春秋之法可見矣武氏奪嗣君之位變唐國號凶威虐法為害嵗久安得無所貶也況書廢武氏者廢其僣竊之號彊大之權復后之位爾復后位所以奉祖宗之法豈不順乎故用春秋之法為唐貶絶罪人且作戒於後也韋后安樂公主進鴆帝論曰中宗真天下下愚之人不可移之性也前代人君如太甲者中人之性爾始以失道為大臣所廢遂能深思前過自新厥徳暨復正位享國永年中宗即位之初過寵后父因大臣􅋀諫有不道之言為母所廢流離艱苦凡十五年賴祖宗功徳入人至深天下之心繫於後嗣故忠義之臣出死力以救始得復歸京師及正位昏庸之態又甚於前崇寵韋氏使預國政縱其姦惡一不為意忠臣諫而不納凶人進而得計賢者罹罪邪者受寵紀綱法度紛然無一條理是中宗厯憂患二十年未嘗修己也人情邪正都不曉也世事美惡都不辨也昬昬然何等人爾故復位數年孱惑如故豈非下愚之人不可移之性歟卒至凶婦逆女結邪謀而終由以至愚自貽其禍也唐史論斷卷上
