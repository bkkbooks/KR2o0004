body:
  text: 司馬温公題跋孫公昔著此書甚自重惜常别緘其藁於笥必盥手然後啟之謂家人曰萬一有水火兵刃之患他財貨盡棄之此笥不可失也每公私少間則増損改易未嘗去手其在江東為轉運使出行部亦以自隨過亭傳休止輒取修之宣州有急變乗驛遽往不暇挈以俱行既行後金陵大火及轉運廨舍弟之子察親負其笥避於沼中島上公在宣州聞之亟還入門問曰唐史在乎察對曰在乃悦餘無所問自壯年至於白首及成亦未嘗示人文潞公執政嘗從公借之公不與但錄魏徴姚崇宋璟論以與之況他人固不得而見也元豐二載察自陽翟來洛陽以書授光曰伯父平生之志萃於此書朝廷先嘗取之留禁中不出今没二十餘年家道益衰大懼此書散逸不傳於人故錄以授子光昔聞公有是書固願見而未之得得之驚喜曰子貺我兼金不如顧無以為報請受而藏之遇同好則傳之異日或廣布於天下使公之徳業煒􅂱於千古庶㡬亦足以少報乎時冬至後五日洓水司馬光書諌議孫公以淵源之學忠讜之論被遇昭陵遂擢寘諫􅁐嘗稱唐太宗規模法制有三代王者之風故平生多喜言唐事每嘆舊史猥雜不足以垂戒後世乃倣春秋編年法修成唐史記七十五卷其間善惡昭然可為龜鑑者因著論以明之篇目凡九十有二皆君相之事業臺諌之紀綱非徒為是區區空言也其史記全書自公殁取留禁中世所可得而見者論斷而已予家藏是本久矣朅來掌敎延平㑹朝廷寛鏤書之禁應本朝名士文集有益於學者皆許流傳乃出此書與學錄鄭待聘㕘考舊史重加審訂鋟木於泮宫以與學者共焉因念自古賢人君子著書立言葢將以明道言之所傳道之所以明也是書成於嘉祐之初迄今百有餘嵗而後顯豈其傳若有所待耶乃若公進退出處之大概見於涑水廬陵南豐東坡四先生之論述可以表信於世兹不復叙云紹興丁丑十月既望新安張敦頤書凖嘗見此書於周南仲家乃蜀本也後徧求之而未得至此見友人劉和甫有此書欲求得之乃云此書舊鋟板於其家塾因鬱攸之變不復存矣慨嘆久之校正其本鋟板於東陽倅㕔之雙檜堂以廣其傳端平乙未郡丞黄凖命工鋟板
