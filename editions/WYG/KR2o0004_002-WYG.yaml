body:
  text: 唐史論斷卷中宋孫甫撰睿宗景雲年論曰古之人君即位必踰年而改元者先君之年不可不終也繼大位不可無始也一年不可二君也先君之年不終則後嗣急於為君而㤀孝心矣繼大位無始則布政立事無以正本矣一年二君則國統不一而民聽惑矣典法如是之重人君可不謹其事歟睿宗於中宗雖兄弟之序然繼其位則同於先君安得不待踰年而改元葢大臣昧於經義而然也今書景雲年者不可分中宗所終之一年為二又不可記睿宗之始年謂之二年故變其例所以戒無禮而正不典也傳位皇太子使主細務論曰睿宗以次子平王賢而有功取内外屬望之意從長子辭讓之誠立為太子又以時多難上象示變知行事不當天意遂傳位於子實大公之心安宗社之計也奈何為一妹所惑雖傳位而不授以政使太子稱帝而主細務自稱太上皇而斷大事此體豈正乎故養成一妹大惡致姦人黨附從而逆謀賴太子英果先事誅之不然内難可測乎葢睿宗雖大公之心而明斷不至也惜哉𤣥宗相姚元崇論曰天子任輔臣非知其忠推誠待之何以責成功輔臣荷天子之知非素藴策畫通逹時務盡節行之何以稱大用明皇之用相姚元崇之事君得其道矣初明皇以崇可相將召之張説輩讒言交結一不能動遂以大柄付之崇荷其信任之意力救時弊行之不疑數十年紛亂之政旬日而變紀綱法令卓然振起非君臣相得之誠至深至悉何以及此然為姚崇則易為明皇則難自中宗復位承武后暴政之餘且為韋庶人所制用姦貪去忠良官職無叙紀綱大亂重以太平暴横不改其惡中外人心思治甚切崇有才智固能觀時事之弊知變之之術一日當國政順人心行之不難耳明皇居藩邸已憤時弊之甚即位之始鋭意求治任崇固宜但張説有輔翊舊勲素親倚方居左右與崇不協崇雖才過於説適在疎逺不任説而任崇此所以為難也嗚呼人主知疎逺之臣可用付以大柄推誠待之使盡其心以成開元治平之業後之人主固宜以此為用賢之法也開元神武皇帝尊號論曰古天子之稱曰皇曰帝曰王葢稱其徳也秦不顧徳之所稱但自務尊極故稱皇帝然亦未有尊號也至漢哀帝始有聖劉太平之號此豈可為法乎髙祖太宗各有功徳俱無尊號髙宗㣘武后之意始稱天皇中宗從韋庶人之欲乃號應天二宗並為婦人所制綱紀號令不由於巳其行事紛亂果合天理乎而稱曰天皇號曰應天是妄自尊大但取千萬世罪與笑耳明皇以賢繼位祖宗善惡之事聞見固熟何故忘髙祖太宗之實徳襲髙宗中宗之虚名葢臣下謟諛不守經義逢君之過而然也故所上表明言何必稽古此人臣不忠之言耳人君行事不可泥古之迹又不可不稽古之道泥古迹則失於通變之機不稽古道無以成大中之法況明皇英偉之主志氣雄俊臣下常以古道諷之尚慮越逸可得更言何必稽古以導其侈心耶酸棗縣尉袁楚客上疏諫娛樂論曰開元二年明皇方勤政治用才傑百度共舉内外無事實有承平之風聽政之暇頗事娛樂以人之常情觀之天子當承平之時稍自娛樂未為大過然深計逺慮之士已憂之矣葢人情大抵好逸憚勞志氣稍充目前無患鮮有不驕惰者驕惰不已憂患遂至此事勢之常也況萬乗之貴為天下所奉又當内外無事恃此自樂驕怠之志必從而生姦人窺其情益求美物作竒伎以奉之心説意快以寵其人一寵之則姦人之徒争奮其計矣姦人得計時政必壞日復一日亂亡自至此人君好逸樂之常勢也故楚客一窺明皇娛樂之意以太康失道不聽五弟所述禽荒色荒甘酒嗜音峻宇雕墻之戒遂至失國秦穆公崇餙宫室由余譏其勞民能改其過乃興霸業之事上疏言之以止驕逸之漸明皇雖容其言而娛樂不改其意自以大功即位方任賢才致天下無事我娛樂何害哉所以忽其言不聽葢明皇才俊性英豪向在藩邸厯知民間事觀韋庶人之黨勢危社稷遂起兵討之能成大功兹乃感憤而為也及即位勵精政事委信賢佐命盡除前日之弊然英豪之性不能純入於道見時無事乃以娛樂為意殊不知娛樂浸久志意漸昬姦邪乘間以進自致危亂也但明皇雄才大畧雖務娛樂猶倚任正人以了國事徳澤之廣入人甚深故久而後致天寳之亂若中材之主不及明皇才畧復不能任賢致天下無事如開元時稍縱娛樂不待久而亂矣或曰人主當天下無事時不可自樂乎曰天下之大政務之廣堯舜至治之世尚曰兢兢業業一日二日萬幾戒慎若此後世之治望堯舜逺矣一時無事得不慎其微乎然人主聽斷之暇宴樂以節㳺幸以時豈不樂乎況天下奉之意無不滿何必從禽獸廣聲色使姦人得以窺其欲耶後世必法堯舜常保儉徳恐有不能但或嗜好於物不可使有形或倦怠於事不可使有迹外或有恩倖之臣權不可假内或有嬖寵之人言不可惑嗜好一形則小人極新美之事曲奉其欲而有所希矣倦怠一露則邪臣陳安逸之趣迎導其意而有所要矣假恩澤之權則黨附必衆而擅恩威矣惑嬖寵之言則私謁盛行而政令撓矣明皇在位既久四事皆不能慎故起天寳之亂然則天寳之亂原於楚客上疏之年矣盧懷慎遺表薦宋璟盧從愿論曰太宗嘗賜魏徴手詔言晉何曾不忠之罪葢謂曾窺見武帝奢逸之心不能切諌但退有後言也觀懷慎與宋璟等所言頗似何曾之意然懷慎與曾言同而意則異矣曾自以奢縱為時所譏見主之過黙而不言此正保位爾其與子孫竊言又欲取名於後世也懷慎清儉有節性復公正非懷固祿寵之人也其主方勤政治未有深過但以髙識見其萌芽不聞切諌此亦可責能與璟等深言且力薦之是使諌正於後以此論之懷慎與曾言同而意異也夫大臣徳望有素無保位懷祿之迹若觀主微過而不言又能薦賢者諫正於後尚可掩過如徳望未著見主過而不言又不能力薦賢者使之諫正此懷祿固位之人雖竊一時富貴千載萬世識者視之當為罪人矣用李林甫平章事論曰帝王之命輔相或自知其人或大臣所薦必名徳有素才能已試者始可協天下之望林甫先圖即官源乾曜薄其才行不許郎官不可為則其人不賢衆所知矣及宇文融引之為黨厯中丞侍郎無一善績可稱雖為韓休所薦休之言亦未必能信於主但武妃力士内為之助遂至大用爾假如明皇以林甫是韓休所薦休有一時之名其言雖可信豈不思武妃力士吾之嬖寵者也林甫為近臣能使嬖寵者為之言其人姦佞可知矣假如惑嬖寵之言不辯其佞既相之後能議何事況不知學術有何所長而任之也是林甫凡百奏請但能希意㫖以取恩寵耳人臣奏請之事若有合於主意當攷其經世濟民理道明白始可無疑若事事合於主意是明有所希而然也況本因嬖寵而用又奏請之事皆合已意凡帝王稍明理道者豈不復慮哉明皇天資不為不明一日昬惑都無念慮遂使姦臣擅權終亂天下則嬖寵之為患也如此夫帝王荷宗社之重主生靈之命不得賢輔何以興起治道求賢輔無他術必取名徳有素才能累試者可矣若名徳未著才能未彰但取嬖寵之言而命之以迎意希㫖而任之是上忘宗社之重下輕生靈之命欲天下不亂不可得也林甫任用浸久内則起大獄引楊國忠使倚貴妃勢以害忠良致其權力外則保任蕃將使專節制利其夷狄賤類無入相之路養成祿山凶威則天寳之亂林甫致之也噫天子一聽嬖寵之言任姦人相國以其迎意希㫖而寵之遂起大亂已罹播遷之禍民陷死亡之難後世人主得不戒之哉張九齡請斬安祿山論曰人君有忌心則賢者不能立事軍國之務至衆一人之智固不能了必藉賢者謀議也賢者謀議多出衆人之見非英睿求治之君往往不諒其心或以忤意厭之或以立異惡之姦邪希㫖之臣摭疑似之事從而讒毁則人君忌之矣既忌之不惟謀議難合且欲鬭一時怒氣多方沮之雖理道明白亦不從也賢者為人君所忌如此欲立事得乎九齡以髙才直道居輔相之位值明皇倦於政治厭聞讜言方且倚任李林甫姦臣謀議固無所合及奏祿山逆狀此先覺獨斷之論非常人可明其以將校敗衂請行軍法此有何難明之理況祿山素無賢名又無大功本以勇鋭可用今戰而敗衂則勇鋭亦不過人不知以何功徳可贖罪也是明皇特以九齡議論堅正多所違忤又聽姦言讒間久有忌心因不從其言而沮之也噫賢者忠於國而君忌之謀議之事雖理道明白不從其言在賢者無負於國矣但人主内倚姦言外養大惡遷播之辱歸咎何人哉刑罰㡬措推功李林甫牛仙客論曰或問開元二十五年明皇用姦人逐賢相戮直臣殺三子此國事大失人道㡬喪也有何徳化尚致天下訟獄希少曰國政善惡皆有後效明皇即位之初勵精政事得姚崇宋璟張九齡之徒繼為輔相盡心賛助故徳化被於人間風俗既厚獄訟㡬息及在位漸久怠於政治雖姦邪乘間而進尚有忠賢任事未至大害於政及罷免賢相専任姦人直臣言事遂遭殺戮三子無辜俱以讒死其他流貶者不可勝道此固君之大過但惡在於内而未及於民前日為善之效流風未改故獄訟尚希也林甫自以専任經嵗姦跡漸露取天下一善事掠之為功將以掩罪徐嶠輩小人得希其意妄托微物用為靈異上以固主心下以愚民聽明皇惑其事從而賞之自此擅威權起大獄姦惡日甚無所不為天寳之亂乃為惡之效也為君為相者勿以目前善迹便為己功當顧己之行事如何耳善惡之事未有不效者也冊忠王為皇太子論曰國之廢立太子可容易哉其立之也非嫡不可非長不可非賢不可開元初明皇立瑛為太子非嫡也非長也但以母善歌舞寵之遂立其子立之固容易耳然立之二十餘年名分久定雖不聞大善亦不聞有過又可容易廢之乎不惟廢之復殺之矣此雖武妃妖惑林甫賊計所致迹其本末亦由張説之過也明皇諸子皆非中宫所生也慎擇賢者立之可矣何必即位之初急立太子葢方寵瑛母用悦其意耳立之嵗久中外不聞其過人心有奉矣開元十七年忠王領河北元帥與百官相見張説退而言曰嘗觀太宗寫真圖忠王竒表寔類聖祖社稷之福也太子在上而説稱忠王竒表比之聖祖事果便乎葢昭成方娠説侍讀東宫知其異事謂王當受天命故因事言之使衆知耳亦或有結王之意説事明皇不惟東宫之舊復賛先天監國之事情義至宻非他相可比故任用以來言必從計必行觀忠王之事豈無宻謀潜議也若果以瑛之才不能任唐事忠王賢足以代之何不定計退瑛於藩而立忠王使父子之際無大過何得宻稱忠王之善而無所定計計雖不定明皇意已移矣天子於太子有移意則嬖寵姦賊之言入之易爾以此論之豈非張説之過也不然二十五年張九齡以直被黜朝廷之士知明皇方惡直言林甫方肆凶計誰復開口敢謀國事明皇於林甫之言無不聽納惟立壽王瑁事不聽而卒立忠王也然瑛之才逺不逮忠王無以辯之但以國有太子而説稱忠王之美又不賛定立子之計使處置得所終致明皇殺子之惡説無以逃其罪矣用聚歛臣王鉷論曰貞觀十年治書侍御史權萬紀奏銀坑事太宗惡其言利遂斥之不令立朝詳味當時致治之風堯舜何以加焉天子富有天下惟患徳義之不充不患財用之不足貞觀中天子勤勞政治敦尚儉徳非賢者不厚禮非功臣不寵賜内無嬖人専其恩外無姦臣竊其澤所用固有節所歛固不厚但慮人才未盡用生民未盡蘇意常不足爾天子務徳義如此所以言利之臣不能洽也天寳之初天子厭倦萬機日恣侈逸内有嬖人擅其寵外有姦臣導其欲恩倖寖廣用度日增常入之物不足以充其費必誅剥生民而後已此所以言利之臣必用於時也韋堅以渭運寵楊謹矜以積財進至王鉷任用則剥割極矣民以戍死邊追理舊課詔恩給復而廣收脚費寃痛之聲徧於天下鉷方以所聚之物謂之羡餘納於内庫以奉天子私費嗚呼天子之費豈有私乎且天子為生民主民勤力以奉之財賦之入固有常數入既有常用得無節乎故行賞於人使内外稱之曰宜也施恵於人使内外稱之曰宜也今乃恣奢逸廣偏賜嬖寵之家競為僣侈權倖之輩各極其欲是明皇用聚歛之臣割肌膚搥骨髓以快姦人女子之心爾快姦人女子之心而取天下之怨欲天下不亂不可得也王鉷聚歛極矣繼以楊國忠用事尤恣無名之取故明皇私費滋廣而内庫盈積季年之亂復資盗賊之用是明皇寵姦巧之臣窮生民之力始則奉私慾終乃為賊資也世之論治亂者多謂繫之時數今以太宗明皇之事驗之太宗斥言利之臣而天下自治明皇用聚歛之臣而天下自亂然則治亂果繫於時數乎後之王者宜鑒於此中官輔璆琳稱祿山不反論曰人主信任中官無甚於明皇也祿山領三道兵權勢力至重又請蕃將以代舊將反計可知楊國忠以貴妃之親極公相之位明皇寵信言無不從及奏祿山逆狀流涕言之是必欲感悟主心也然而明皇竟未之信潜使璆琳往察其狀是信國忠之意未及於中官也其意曰國忠我之寵丞相也但祿山有功不無忌嫉則其言未必忠於我也璆琳日在左右我所親信委之以事必盡忠於我也以此待璆琳之意過於國忠及為璆琳所誤遂成大亂雖誅之何益後之人君信待中官者可不慎哉肅宗李光弼斬御史崔衆論曰將帥専閫外之事不行法不尚威固難以立功然行法尚威止以制服部下將士使一聽吾令盡力於事也若天子遣使於軍中有所違犯亦自戮之則置朝廷於何地況靈武初基大亂未定為將帥者固當盡忠義之心尊奉王室以起盛大之勢尚慮威靈未張安得為强横之態以輕朝廷即崔衆奉詔交兵驕慢將帥此固有罪奈奉朝命何不論奏其狀乞行國法於時天子方倚注將帥無不從之理天子從之而行法則將帥尊朝廷威二事俱濟矣何至忿其無禮遽行軍法朝廷已任其人堅拒王命至言宣勅則斬中丞拜宰相則斬宰相此强横之甚矣且穰苴之斬監軍以苴起卑下未為將士信服故請君之寵臣監軍因其有犯而行法立威以濟國事非已有所忿也光弼受將帥之任功效已著威名已髙不待戮衆而三軍信服矣況衆為御史奉朝命交兵又非監軍之比以驕慢戮之是因忿而行法至有斬宰相之語豈非强横之態也將帥之臣遇朝廷微弱强横自恣此固跋扈者常事且光弼忠賢不當如是葢暗於大體忿而不思也光弼將帥之才傑出於時平賊之功髙於諸將晚為讒人所間大節微虧葢不能去强横之態也惜哉賊陷睢陽害張巡論曰宰相舉事繫天下利害常盡大公之心尚慮智謀不周或至敗事況挾不平之意乎房琯之為相也與賀蘭進明有私怨進明帥河南既兼御史大夫是假風憲之威以重其任琯又用許叔冀為都將亦兼大夫均其官使不為下此宰相乘不平之氣舉事爾遂使睢陽危迫而進明不救忠賢數人為賊所害軍民之衆罹其荼毒或曰賀蘭進明好進之人巡逺功名既髙固有嫉之之意雖無許叔冀争權未必出兵救援則睢陽陷賊實進明之罪不繫房琯之過也荅曰進明先授攝御史大夫不滿其意遂極言排琯交憾愈深此固好進之人及帥河南權任甚重琯或慮其難制必用大將以分其權則當擇賢才任之使共力國事奈何叔冀一狡險人為都將復重其官與節帥等是正使各尚氣勢不相下爾豈宰相大公之意也不然進明雖好進於巡逺功名不無嫉意當南霽雲求救忠義憤發言詞哀切足以感激於人稍異木石者必動心進明亦非全然凶狠不知情義者安得絶無救意豈非有憚而然耶或曰韓愈作張巡傳後叙止言進明嫉巡逺聲威功績出己之上不肯出師不言叔冀事荅曰愈叙張巡事以李翰所作傳尚有遺落據汴徐間老人所言者書爾老人傳當時事又豈能窺進明之情況愈所書止曰遺事故不盡其本末唐史髙適傳載移書許叔冀使釋憾同援梁宋此事尤足證明則房琯挾怨用人致睢陽陷沒頗為得實嗟夫琯以時名作相不能立大功輔大業已負肅宗倚任之意又挾怨用人致敗國事則琯之流落以沒非不幸也後為相者戒之烏承恩為史思明所害論曰李光弼謀史思明事何不度事機不顧國體之甚思明為祿山逆黨罪不容誅但能從耿仁智忠義之言以范陽一道歸於朝廷雖險詐之心未可全信已能斬安慶緒之黨表歸順之節天子命之節帥封之王爵恩寵方厚未見復叛之迹何遽遣人圖之也若以叛逆之罪險詐之情必不可留亦須國威兵力足以制服其心赫然命將誅之示天下去惡之法何至方降國命之際乃遣人為之副介使潜結部曲圖之此豈國體也況河北殘㓂尚未平定叛逆之黨方觀國之恩信厚薄為向背之計思明既以歸順被寵隨而圖之使叛者決其計此又豈事機也使思明復叛大亂兩河毒生民敗王師凶勢之盛數年始平由兹失策矣噫光弼賢將謀乃如是之失後之謀國事者得不深慮之九節度使討安慶緒論曰用師不立統帥固鮮成功又況内臣監其事也慶緒反於東都兇勢已去雖有衆數萬尚據相州人心賊氣不同前日一子儀一光弼討之沛然有餘力何必二帥並命既以二帥俱元勲難於相統故不立元帥雖失用帥之法别無維制猶可成功何至假魚朝恩觀軍容宣慰之名朝恩内臣天子所親信者也天子親信之臣而觀軍容且復宣慰是主一時之事也既主其事必有預謀畫作恩威取功名之意然子儀光弼以元勲自任必不曲從也諸鎮之將觀其勢肯不附託乎肯無畏避乎他將各自為謀子儀光弼盡力於事命令不能制於衆矣措置如是欲不敗不可得也故數月間不能平定殘冦九鎮之師卒潰而歸河南之民大罹其毒由兹措置之失也李峴降蜀州刺史論曰肅宗逐李峴不唯為内臣所制亦昏暗然也峴之名徳為時信重作相未踰月謀論風采已能聳動中外及論毛若虚姦回致崔伯陽等無罪譴逐此固易明之事一縣尉捕捉殺馬坊卒非兇暴之甚安敢行法李輔國言卒之寃伯陽等按覆之具得其狀獨若虚附㑹輔國力言其寃肅宗不信伯陽等公正之言但􅑀若虚姦奏豈非為輔國所制既枉逐正人宰相辯之復以為累且對侍臣言峴專權逐之逺郡獨為寛法是果不能辯曲直察枉正昏暗之甚也輔國一閹人以護從微勞寵用過分遂致强横撓亂國法公卿百官承附者衆峴既為相首論其狀輔國尋讓任用雖出忿意是亦知懼也一閹人强横天子不能制大臣不敢忤賢者作相首挫其鋒若任之嵗時必能制其姦惡不至於甚峴方盡心國事無所畏避肅宗以為專權而逐之養成輔國之勢卒至大惡噫肅宗中興之主也以過寵内臣遂昬懵至此惜哉代宗僕固懷恩留賊將分帥河北論曰僕固懷恩留賊將之降者分帥河北以為巳援此固不忠之罪然觀其情有所憚而為之也肅宗寵信内臣為將帥之患郭子儀討平大亂收復二京元勲厚徳天下瞻望但不與魚朝恩相協為其讒間遂罷兵權李光弼戰伐盡力動有竒功才謀忠勇冠於諸將亦為朝恩所撓致有敗衂懷恩前從子儀知其事矣後事光弼憚其嚴而不附遂與朝恩協議以敗其功又施其計矣以李郭之功不能固其權任況他帥乎又觀代宗即位之始程元振輩用事於内甚於朝恩來瑱居將相之任一不從元振請託無罪而殺此懷恩所以不肯盡忠也若懷恩止慮賊平寵衰他無所憚則其父子力戰不踰年平定劇賊一門之内死王事者四十餘人此豈欲養賊乎何已平大盜而存其餘蘖是必有所憚而然爾人主任將帥使之盡忠有常道矣駕馭之術賞罰之典固不可失機㑹能不容權倖之人間其恩沮其謀使内有所憚外無所撓天下有事即當大任而無他憂天下無事則荷眷寵而不衰替則盡忠者衆矣肅代皆寵内臣過厚待將相不至使懷恩猜貳自為身謀狡計一生河北非天子有矣顔真卿降硤州論曰君之逐臣也或自見其過或為人所言自見其過必無忌心可矣為人所言尤當觀其狀察其情也顔真卿立朝議論風節時無倫比元載作相方引用私黨惡人之言遂請百官言事必先咨宰相而後上聞真卿極論其事以謂蔽塞言路過於林甫國忠時中外傳布稱真卿言為當故載深銜之因真卿攝祭太廟以祭器不修言於朝遂誣以誹謗而逐之且祭器不修衆所共見況繫有司之事言之豈為誹謗哉代宗雖非英睿之主亦非昏庸真卿之賢理宜知之載怨真卿之情理宜察之何不能辨其事而逐真卿豈非以載方擅權不能違其意乎代宗行事素尚寛厚且容宰相擅權而逐賢臣則尚寛之為害也如此夫君之為國也必有駕馭大臣之術有主張賢人之力然後大臣不敢擅權賢人得以立事代宗不通是道故元載積惡真卿不容於立朝大厯之政法廢弛由此致也李寳臣為馬承倩所辱復叛論曰天子遣使方鎮所以禮將帥恩軍民察事機也非謹厚有識之人惡可充其任況方鎮承朝廷姑息養成跋扈之勢久矣一日有奉詔立功者遣使撫勞尤在擇人天子但信任内臣不擇而使可乎河北自天寳末為賊所據至寳應中始平之僕固懷恩奏賊將之降者李寳臣田承嗣輩分帥諸鎮遂擁强兵署置將吏擅其土地不貢不覲交相親結勢不可破凡十餘年間朝廷止以目前未叛為安不能制馭也大厯十年田承嗣叛㑹李寳臣與之有隙表請討之代宗遂命出師寳臣果能與李正巳破承嗣之衆擒其將歸之京師是讐怨已深功效已著此天賜之機使唐統制河北也於是時朝廷當選賢明公勤之臣使勞其師恩其軍以厚禮安之正言諭之則前日桀黠之心必盡變今日已成之效必盡力乘勝破滅承嗣魏博自歸朝廷命賢帥守之寳臣正己自以有功於國各荷恩奬欲不效順不可得也茍復跋扈必有一先動者别帥討之尤易為力豈非天使唐統制河北之機耶今乃使中官劉清潭勞賜將士所至髙會不時進發故恩賞失時已沮三軍之氣矣又遣中官馬承倩宣勞寳臣無見貪愚之人不知亷恥不識事宜寳臣遺之百縑承倩詬罵擲於道中寳臣慙怒復與承嗣相結正己窺之亦不盡力於是玩養承嗣朝廷不能制不數年河北叛亂遂成横流之勢則天子任使内臣可不鑒哉李栖筠卒論曰天子擇宰相患不能知其人故所用或不賢賢者或不用代宗於元載知其不賢也於李栖筠知其賢也知不賢而久用之知其賢而不大用何哉大厯六年代宗察載姦貪故任栖筠為御史大夫使制之自是數年栖筠雖盡公忠之節而載姦貪日甚卒不能制葢宰相任天下事御史大夫主風憲權固不侔況載内結倖臣外植姦黨使栖筠並相守道寡援尚慮未勝一風憲職誠難制之也代宗既知其賢胡不罷載而相栖筠何至使憂憤而終也必以載有内外之助未易可罷則内外之黨能惑人主始為之助代宗知載姦貪既已不惑其黨安能為助既不能助又何憚而不罷也至十二年發載罪誅之内援者戮外黨者逐又何難哉豈非稔載之惡俟其極而去之也殊不知稔其惡數年間亂國事害生民多矣葢代宗優柔雖察載之惡而斷之不蚤遂使姦臣大害於國賢者憂憤而終惜哉徳宗開陵陽渠城原州論曰楊炎為宰相論内庫之弊使財賦一歸有司言租庸之害定兩稅以便天下才力頗稱其任矣及建議浚陵陽渠不從嚴郢之言以起民怨城原州不納段秀實之計以致兵叛何其自敗功業也宰相之任固當竭才力以興國事苟謀議未至安得不從人之善況浚渠之事嚴郢引内圍種稻之費以明之利害甚顯何故不從其言也原州之議秀實請俟農隙興功是將安衆而立事又何故不納其計也不惟不從且仇其人矣葢炎自恃才力方持大權不欲天下之人一違其議故樹威如此殊不思宰相之議繫天下利害必在於是爾未至於是有違之者安得不從也從於善人稱賢矣已有賢名則何損才力何害大權乎兹至公之道也炎雖有才而心不公故不能成就功業卒至禍敗後之為相者戒之楊炎貶崖州司馬賜死論曰楊炎懷元載私恩仇劉晏而害之此固大罪正名誅之宜矣然炎之害晏本出私怨徳宗殺炎又非公法始炎譖晏言嘗託附獨孤妃欲立韓王徳宗不察虚實便以晏不利於巳至遣使先殺晏後詔以忠州叛罪之此君與相俱以私心殺害勲賢仍誣其罪用掩己過是上欺於天下欺於人中外寃惜固不能已也炎懼人言之多奏遣腹心使於四方言殺晏之事本由君怒以解己罪徳宗聞之又惡殺勲賢之事在己乃怒炎有意誅之若下詔述巳聽讒殺賢之過深自責雪晏之枉優加贈典正炎之事肆諸市朝猶可戒巳失道明國常憲使姦險者知懼忠憤者快心反擢用盧把姦惡益甚於炎乃加炎他罪殺之此豈公也為君為相逞私欲如是相欲無禍君欲不危難哉陸贄論吐蕃疾疫退軍論曰觀陸贄論吐蕃情狀不足助國討賊適足為患此賢者逺識也中國有事藉夷狄之力未有不為大患者服荒逺貧苦之俗習争鬭賊殺之事一日引之中國彼窺其利必當動心也且髙祖初起義兵得突厥數百人為助遂恃微功貪求不已後連嵗入冦為闗中患近十年髙祖至欲遷都避之肅宗以慶緒之亂藉回紇助兵雖與將帥同收二都至許之害生民取貨賄兹固中國之醜又嵗許賂遺及以帝女下嫁僅得一二年無事及遣兵助攻相州諸鎮軍潰回紇亦奔此豈能必勝也代宗以朝義未平復藉回紇兵力雖得數千人來助驕横兇悖元帥僚屬皆朝廷近臣多所鞭撻而死所過剽刼尤甚於賊賴僕固懷恩盡力始能同滅朝義代宗恩賞姑息無所不至曾未數年已入冦畿甸矣中國藉夷狄之力其患如此非特古事為驗乃唐事實然徳宗熟聞而親見也聞見而不能鑒又欲藉吐蕃之力葢當賊泚之亂車駕播遷艱危之中復行誤計爾吐蕃桀黠甚於諸戎結賛好謀尤多姦詐徳宗雖遣使賂遺促其發兵已與賊泚交通為觀變之計賴天祐唐祚使遘疾疫而退不然陸贄所慮進兵畿郊不却不前外奉國家内連兇逆兩受賂遺且恣剽刼王師不得伐叛庶民不得保生賊雖耗亡我亦困竭其勢至此唐祚危矣則中國雖衰不可假夷狄明矣不幸有事惟推至誠任人以激忠義天下之大臣民之衆必能盡力於國茍藉夷狄之力未有不為大患也盧把姦邪論曰李勉以盧杞姦邪天下皆知獨徳宗不知所以為姦邪此勉知其一未知其二杞姦邪惑主固有其術其始未能辯也及以大罪貶竄徳宗復念之此由性所合爾葢徳宗性忌盧杞性險人臣希主所忌之意而行其險計此固易合也當李懷光赴難奉天杞懼言巳之罪故沮其朝見致懷光怨望以叛徳宗悟其事已逐杞矣悟其事是辯其姦邪矣既辯而復念之葢當危難則不敢徇己之情懼臣下不盡力於平賊也賊既平復歸京師又欲肆己所為顧朝廷之臣未有如杞能希其意者故念之念之必將用之豈非性有所合也賴忠賢力諫其事杞復早死不然把必再用用則天下再亂矣人主性忌者宜戒之李晟論張延賞過惡論曰初徳宗用延賞相舊史言李晟與延賞不協表論其過故改授僕射初疑以為晟恃功挾怨以沮延賞及詳其本末乃晟忠於徳宗非恃功挾怨也晟雖一代元勲位崇官極常慕魏鄭公之為人思致君如貞觀之治事有當言犯而無隠至徳宗相延賞表論其過者知延賞非宰相器也但徳宗注意延賞必欲大用乃諭晟與之釋憾㑹劉元佐韓滉入朝以徳宗意勸晟表薦延賞晟不得已言之此又見晟不敢恃功固拒主意為强臣之態也延賞既相為徳宗寵待言無不從齊映居相位雖無顯赫才業言事薦賢頗稱純直延賞嘗與不足逐之逺郡怒晟不解以讒言罷其兵權又忌栁渾忠直擠之罷相本嫉晟社稷大功欲用劉元佐李抱真輩收復河隴以髙之遂建議減官收俸料以助軍既罷晟兵權抱真輩不平遂辭邊任又減官詔下衆言不便延賞復請量留員數以解謗譏作相數月鋭意報寃舉事輕脱如此固非宰相器則晟之表論其過豈非忠於徳宗乎但徳宗好姦人必使延賞作相尚以早卒未能大害天下不然時政亂矣或曰李晟言延賞不可大用於主誠忠矣然將帥方成大功領兵權進退宰相可乎荅曰將帥賢如晟名徳為下信服如晟者見天子命相非其人言之可矣不及晟者言之未免為强横也疑忌李晟論曰李晟自偏將至節度使謀無不成戰無不勝威名忠義為衆信服天子有將帥如此固可久任也況平大亂為一代元勲仁明之徳忠直之節無賢不肖知之矣天子得不久任之乎徳宗既委晟西北之任吐蕃畏之收河隴制諸戎必矣遂因入冦揚言以間晟且曰召我來何不具牛酒晟尋遣將出擊授以節制大破之以晟之元勲復有是功效稍有識者可辨吐蕃之情矣張延賞懷怨於晟承間讒之徳宗遂惑罷晟兵權使奉朝請葢徳宗之性疑忌之甚也若止惑延賞讒言何故貞元三年罷晟兵權是年延賞死至九年晟死其間七年吐蕃數為冦竟不任晟兵權但使奉朝請終身焉豈非忌晟之甚也晟之元勲令徳時無與比尚疑不任他帥窺之肯盡力乎他帥不盡力不惟邊患不弭據方鎮而復為跋扈計者往往有焉知天子踈忌賢臣少畏憚也聽讒忌賢其患如此後代觀之宜為深戒宰相崔損便辟固位論曰天子置宰相所以助治國事安社稷泰生民也徳宗用宰相但説奉己爾崔損厯官清要無善可稱一姦人裴延齡薦之遂用為相居位八年畧無能效惟過為恭遜兼事便辟以中天子意徳宗雖知衆議不容寵之終身焉是不求助國但悦奉己者明矣助國之相非無其人徳宗未嘗久用也如蕭復清潔守正才識髙逺論張鑑必禍言宦者干政識盧把姦邪莫非深切姜公輔博學純正好論時事奏拘賊泚㡬止其亂栁渾方直慷慨敢言憂平凉之㑹為戎所詐尋如其言陸贄善文辭識事機奉天作詔使武夫感激使懷光軍定李晟移軍致專力平賊之議凡論天下事無不得其體要顧此數人者才能謀議咸有先覺至忠之効誠助國之相也徳宗用之不越一年俱以罷免復加譴逐葢忌其言直又為姦人所間也賢者既逐小人任用故藩臣跋扈於外宦官專權於内法令不整朝綱日紊但容容然務行姑息之政以茍目前無事殊不知宗社辱矣生民病矣萬乘之體屈矣然人主多悦恭遜便辟之人者以其循嘿不忤於巳為退静耳殊不知此類無才能無績效果退静何由得至左右也是必宻為邪佞之計干進於時姦雄得志者以其附己趨向相合引而進之矣人主悦此類何不思國之設官自宰相至百執事皆取其稱職茍不稱職但為恭遜便辟何補於事哉人主何不察人之本末而用之所用者有何才力立事有何勲勞濟物有何謀議助國有何風節著時由賢者所薦耶由權倖所引耶以事驗之賢不肖分矣若不驗以事但曰其人恭遜也人臣於天子豈有不恭之理但觀所為何如茍以循嘿為恭此正不恭之大者葢循嘿之人見君之過不言也見事之失不救也時之安常保其寵時之危不預其事姦人之意則曰我以不忤意得位君失道國不治我之寵不衰何必忤意而自令失位也庸人之意則曰我無才能君以循嘿而貴我君失道國不治豈我能救哉姑嘿以固其寵爾此豈非不恭之大者乎忠賢則不然見君過必言見事失必救其意曰我之君豈下古之明王哉我賛助之必至於聖而後已君之聖則時安而民泰我居位無媿矣若不言其過不救其失陷君於不明則時不安而民不泰我竊位之罪人也故盡心於國知無不為其意如是豈非恭之大者乎人君以忤巳反謂之不恭多疎棄之此不思之甚也雖然人臣固有美節可貴者如李靖在貞觀中任僕射功名盛大恂恂退遜似不能言李􅅠在元和中風績甚髙自淮南帥召為宰相知倖臣所薦竟辭不拜韋澳在大中間任京兆尹才望甚著宣宗欲命判户部澳嫉縉紳貪位敗教堅辭其任此可謂之退静矣若無才無力過事恭遜何足謂之退静此正姦雄固寵之術爾唐史論斷卷中
