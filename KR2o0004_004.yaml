body:
  text: 歐陽文忠公所作墓誌節文公博學强記尤喜言唐事能詳其君臣行事本末以推見當時治亂每為人說如身履其間而聽者曉然如目見故學者以謂閲嵗讀史不如一日聞公論也所著唐史記七十五卷論議宏贍書未及成卒於家公既卒詔取其書藏秘府蘇東坡荅李方叔書節文錄示孫之翰唐論僕不識之翰今見此書凜然得其為人至論褚遂良不譛劉洎太子瑛之廢由張説張巡之敗縁房琯李光弼不當圖史思明宣宗有小善而無人君大略皆舊史所不及議論英發暗與人意合者甚多又讀歐陽文忠公志文司馬君實跋尾益復慨然然足下欲僕别書此文入石以為之翰不朽之託何也之翰所立於世者如此雖無歐陽公文可也而況欲託字畫之工以求信於後世不已陋乎曾南豐所作行狀節文公博學强記其氣温其貌如不能自持及與人言反覆經史上下千有餘年貫穿通洽不可窺其際而退視其家初未嘗蓄書葢既讀之終身多不忘也所著唐史記七十五篇以謂已之所學治亂得失之説具於此可以觀公之志也公殁有詔求其書曾南豐經進隆平集節文孫甫字之翰許州人天聖五年同學究出身八年再舉登進士第杜衍在樞宻府薦之除秘閣校理累擢天章閣待制河北都轉運使留侍講卒年六十贈右諫議大夫著唐史書七十五卷每言唐君臣行事以推見當時治亂若身履其間聞者釋然曾南豐寄之翰古詩一首孫侯腹載天下書崔嵬豈啻重百車伏羲以來可悉數孰若自作何有餘更能議論恣傾倒萬里一㵼崐崘渠誰為胸中斡太極元氣浩浩隨卷舒昔來諫官對天子何穢不欲親芟鋤不容乃獨見磊落出走北海飄長裾孫侯風節何所似雪洗八荒看太虛親如國忠眼不顧舊若張禹手所除歸來已絶褒貶筆進用祗調敷倉儲合持詩書白虎論更䕶日月金華居萬世深根固社稷百年舊叟休田廬素識孤生愛茅屋久將老母求山砠秋歸願事九江獲夜出未倦安豐漁孔明茍欲性命遂孟子豈病王公疎塵埃未得見此樂太息一付西江魚
